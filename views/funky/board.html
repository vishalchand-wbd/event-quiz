<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz — Big Screen</title>
  <!-- favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       Funky / neobrutalist theme — Stage I.
       Light pastel gradient bg, paper panels with thick ink borders,
       hard offset shadows, colored answer tiles. Big screen / projector.
       --green and --red are remapped to mint and coral so the
       Chart.js bars (which read these CSS vars) match the theme
       without JS changes.

       Stage I: viewport-aware sizing. clamp() values that previously
       used only `vw` now use `min(Xvw, Yvh)` so font-size and padding
       downscale on shorter viewports (e.g. 1366x768, 1024x768). 100vh
       → 100dvh on body to handle browser-chrome fluctuation. .stage
       padding now uses vh-relative top/bottom so headroom shrinks on
       short displays without affecting 1920x1080 projector visuals.
       ============================================================ */
    :root {
      --purple: #7b2fff;
      --purple-dark: #4a0fc7;
      --yellow: #ffe600;
      --yellow-dark: #d4bc00;
      --ink: #141018;
      --paper: #fef7ff;
      --mint: #4ef2c6;
      --coral: #ff5c7a;
      --gold: #ffd700;
      --gold-warm: #ff8c00;
      --silver: #c0c0c0;
      --bronze: #cd7f32;
      /* Chart.js reads these via getComputedStyle. Map to mint/coral so
         correct=mint, wrong=coral on the reveal chart. */
      --green: #4ef2c6;
      --red:   #ff5c7a;
      --shadow:    8px 8px 0 var(--ink);
      --shadow-md: 6px 6px 0 var(--ink);
      --shadow-sm: 4px 4px 0 var(--ink);
      --radius: 20px;
      --radius-sm: 14px;
      --font: 'Fredoka', system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      height: 100dvh; overflow: hidden;
      font-family: var(--font);
      color: var(--ink);
      font-feature-settings: "ss01";
    }
    body {
      background:
        radial-gradient(circle at 20% 20%, #fff2a8 0%, transparent 45%),
        radial-gradient(circle at 80% 10%, #e4d4ff 0%, transparent 40%),
        linear-gradient(165deg, #ffeef9 0%, #dcd6ff 40%, #b9f0ff 100%);
      background-attachment: fixed;
    }

    /* ---------- Topbar ---------- */
    .topbar {
      position: absolute; top: 0; left: 0; right: 0;
      padding: clamp(14px, 2vh, 22px) clamp(20px, 2.8vw, 36px);
      display: flex; align-items: center; gap: 16px;
      z-index: 10;
    }
    .topbar .logo {
      height: 38px;
      filter: drop-shadow(3px 3px 0 var(--ink));
    }
    .topbar h1 {
      margin: 0; font-size: 20px; font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--ink);
    }
    .topbar .meta {
      margin-left: auto;
      display: inline-flex; align-items: center;
      padding: 6px 16px;
      background: var(--paper);
      border: 3px solid var(--ink);
      border-radius: 999px;
      box-shadow: var(--shadow-sm);
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
    }
    .topbar .meta:empty { display: none; }

    /* ---------- Stage container ----------
       Stage I: padding now scales with viewport. Top floors at 72px so it
       always clears the absolute-positioned topbar (~70px tall). On tall
       screens it stays at 100px (current behaviour). On short screens it
       compresses to give content more room. */
    .stage {
      position: absolute; inset: 0;
      padding: clamp(72px, 9vh, 100px) clamp(28px, 3.5vw, 60px) clamp(32px, 5vh, 60px);
      display: flex; flex-direction: column;
    }

    /* ============== LOBBY ============== */
    .lobby {
      flex: 1;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: clamp(28px, 4vw, 60px);
      align-items: center;
    }
    .lobby .left .kicker {
      display: inline-block;
      padding: 8px 18px;
      background: var(--yellow);
      border: 3px solid var(--ink);
      border-radius: 999px;
      box-shadow: var(--shadow-sm);
      font-size: 16px; font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .lobby .left h2 {
      margin: clamp(16px, 2vh, 24px) 0 clamp(20px, 3vh, 32px);
      font-size: clamp(44px, min(8vw, 13vh), 116px);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .lobby .left .url {
      display: inline-block;
      padding: clamp(10px, 1.5vh, 16px) clamp(16px, 2vw, 26px);
      background: var(--paper);
      border: 4px solid var(--ink);
      border-radius: var(--radius-sm);
      font-size: clamp(16px, min(1.8vw, 2.5vh), 28px);
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.01em;
      box-shadow: var(--shadow-md);
      font-family: ui-monospace, 'JetBrains Mono', monospace;
    }
    .lobby .right {
      display: flex; flex-direction: column; align-items: center;
      gap: clamp(20px, 3vh, 36px);
    }
    /* QR card — white inside thick ink border. Library is qrcodejs (NOT
       npm 'qrcode') — DO NOT CHANGE. See known bug #3. */
    .lobby .qr-wrap {
      width: clamp(180px, min(28vw, 42vh), 360px);
      aspect-ratio: 1 / 1;
      background: #fff;
      border: 4px solid var(--ink);
      border-radius: var(--radius);
      padding: clamp(12px, 1.6vh, 18px);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow);
    }
    .lobby .qr-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .lobby .qr-wrap #qr-target { width: 100%; height: 100%; }
    .lobby .qr-wrap #qr-target img { width: 100% !important; height: 100% !important; display: block; }
    .lobby .qr-wrap #qr-target canvas { display: none !important; }
    .lobby .qr-wrap .placeholder {
      color: var(--ink); font-size: 14px; text-align: center;
      font-family: ui-monospace, monospace;
      opacity: 0.7;
    }
    .lobby .player-counter {
      text-align: center;
      padding: clamp(12px, 1.8vh, 18px) clamp(20px, 2.5vw, 32px);
      background: var(--paper);
      border: 4px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
    }
    .lobby .player-counter .label {
      font-size: 14px; font-weight: 700; color: var(--ink);
      text-transform: uppercase; letter-spacing: 0.12em;
    }
    .lobby .player-counter .num {
      font-size: clamp(48px, min(8vw, 12vh), 110px);
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.04em;
      color: var(--purple-dark);
    }
    /* Big PIN — yellow gradient with 4px dashed ink border, lifted by hard
       shadow. Most prominent thing on the lobby screen. */
    .lobby .left .code-display {
      margin-top: clamp(20px, 3vh, 36px);
      display: flex; flex-direction: column; gap: 12px;
    }
    .lobby .left .code-label {
      font-size: 16px; font-weight: 700; color: var(--ink);
      text-transform: uppercase; letter-spacing: 0.12em;
      opacity: 0.75;
    }
    .lobby .left .code-value {
      display: inline-block;
      padding: clamp(8px, 1.2vh, 12px) clamp(20px, 2.8vw, 36px);
      background: linear-gradient(135deg, var(--yellow), #fff8b0);
      border: 4px dashed var(--ink);
      border-radius: var(--radius);
      font-size: clamp(52px, min(9vw, 13vh), 120px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.16em;
      font-variant-numeric: tabular-nums;
      color: var(--ink);
      box-shadow: var(--shadow);
      align-self: flex-start;
    }

    /* ============== PREVIEW ============== */
    .preview {
      flex: 1;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      gap: clamp(20px, 3vh, 36px); padding: clamp(20px, 3vh, 40px);
      text-align: center;
    }
    .preview .preview-label {
      display: inline-block;
      padding: 10px 24px;
      background: var(--yellow);
      border: 3px solid var(--ink);
      border-radius: 999px;
      box-shadow: var(--shadow-sm);
      font-size: 18px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    .preview .preview-q-text {
      margin: 0;
      padding: clamp(20px, 3vh, 32px) clamp(28px, 4vw, 56px);
      background: var(--paper);
      border: 5px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      font-size: clamp(36px, min(6vw, 11vh), 100px);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
      max-width: 1400px;
      color: var(--ink);
    }
    .preview .preview-counter {
      font-size: 18px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink);
      opacity: 0.65;
      margin-top: 12px;
      font-variant-numeric: tabular-nums;
    }

    /* ============== QUESTION ============== */
    .question {
      flex: 1;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: clamp(14px, 2vh, 24px);
    }
    .question .qmeta {
      display: inline-flex; align-items: center; gap: 14px;
      padding: 8px 18px;
      background: var(--coral);
      border: 3px solid var(--ink);
      border-radius: 999px;
      box-shadow: var(--shadow-sm);
      color: var(--paper);
      font-size: 16px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      align-self: start;
      justify-self: start;
    }
    .question .qmeta .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--paper);
      animation: livepulse 1.4s ease-in-out infinite;
    }
    @keyframes livepulse {
      0%, 100% { opacity: 0.5; transform: scale(0.85); }
      50%      { opacity: 1;   transform: scale(1.15); }
    }
    .question h2.q-text {
      margin: 0;
      padding: clamp(16px, 2.2vh, 24px) clamp(20px, 2.8vw, 36px);
      background: var(--paper);
      border: 5px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      font-size: clamp(28px, min(4.6vw, 8vh), 78px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .question .opts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(12px, 1.4vw, 18px);
    }
    /* Colored answer tiles — yellow / mint / purple / coral, matching the
       quizzy palette. JS sets each option to class="opt"; nth-child gives
       the four colors without any JS change. */
    .question .opt {
      display: flex; align-items: center; gap: clamp(14px, 1.8vw, 22px);
      padding: clamp(14px, 2vh, 22px) clamp(18px, 2.2vw, 28px);
      background: var(--yellow);
      color: var(--ink);
      border: 4px solid var(--ink);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
      font-size: clamp(18px, min(2.2vw, 3.5vh), 32px);
      font-weight: 700;
      line-height: 1.2;
    }
    .question .opt:nth-child(1) { background: var(--yellow); color: var(--ink); }
    .question .opt:nth-child(2) { background: var(--mint);   color: var(--ink); }
    .question .opt:nth-child(3) { background: var(--purple); color: var(--paper); }
    .question .opt:nth-child(4) { background: var(--coral);  color: var(--paper); }
    .question .opt .letter {
      flex: 0 0 clamp(40px, min(4vw, 6vh), 56px);
      height: clamp(40px, min(4vw, 6vh), 56px);
      border-radius: 50%;
      background: var(--ink); color: var(--paper);
      border: 3px solid var(--ink);
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: clamp(16px, min(1.6vw, 2.4vh), 22px);
    }
    .question .opt:nth-child(3) .letter,
    .question .opt:nth-child(4) .letter {
      background: var(--paper); color: var(--ink);
    }
    .question .footer {
      display: flex; justify-content: space-between; align-items: end;
      gap: clamp(18px, 2.5vw, 32px);
    }
    .question .answers, .question .timer-block {
      display: flex; flex-direction: column;
      padding: clamp(12px, 1.6vh, 18px) clamp(16px, 2vw, 26px);
      background: var(--paper);
      border: 4px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      min-width: clamp(180px, 18vw, 280px);
    }
    .question .timer-block { text-align: right; }
    .question .label {
      font-size: 14px; font-weight: 700; color: var(--ink);
      text-transform: uppercase; letter-spacing: 0.12em;
      margin-bottom: 4px; opacity: 0.7;
    }
    .question .big-num {
      font-size: clamp(40px, min(6.5vw, 10vh), 92px);
      font-weight: 700; line-height: 1;
      font-variant-numeric: tabular-nums; letter-spacing: -0.03em;
      color: var(--ink);
    }
    .question .big-num .of {
      opacity: 0.5;
      font-size: 0.55em;
      font-weight: 600;
    }
    .question .timer-num.warn {
      color: var(--coral);
      animation: warnpulse 0.7s ease-in-out infinite;
    }
    @keyframes warnpulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

    /* ============== REVEAL ============== */
    .reveal {
      flex: 1;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      grid-template-rows: minmax(0, 1fr);
      gap: clamp(20px, 2.5vw, 32px);
      min-height: 0;
    }
    .reveal .chart-side {
      display: flex; flex-direction: column;
      background: var(--paper);
      border: 4px solid var(--ink);
      border-radius: var(--radius);
      padding: clamp(20px, 2.8vh, 32px);
      box-shadow: var(--shadow);
    }
    .reveal .chart-side .q-text {
      margin: 0 0 6px;
      font-size: clamp(20px, 2vw, 32px);
      font-weight: 700;
      line-height: 1.2;
      color: var(--ink);
    }
    .reveal .chart-side .pct {
      display: inline-block;
      margin: 12px 0 22px;
      padding: 8px 18px;
      background: var(--mint);
      border: 3px solid var(--ink);
      border-radius: 999px;
      box-shadow: var(--shadow-sm);
      font-size: 18px; font-weight: 700;
      color: var(--ink);
      align-self: flex-start;
    }
    .reveal .chart-side .pct .big {
      font-size: 32px;
      font-variant-numeric: tabular-nums;
      margin-right: 4px;
    }
    .reveal .chart-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
    }
    /* Stage I.1: options legend below the chart. X-axis now shows just
       letters (A/B/C/D) at large size; full option text appears here in
       a 2x2 grid so long answers like "Can you see my screen?" don't
       force Chart.js to rotate/skew the x-axis labels. */
    .reveal .chart-side .options-key {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
      flex-shrink: 0;
    }
    .reveal .chart-side .options-key .key-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 14px;
      background: #fff;
      border: 3px solid var(--ink);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
      font-size: clamp(13px, min(1.2vw, 1.7vh), 18px);
      font-weight: 600;
      min-width: 0;
      line-height: 1.25;
    }
    .reveal .chart-side .options-key .key-row .letter {
      flex: 0 0 26px; height: 26px; border-radius: 50%;
      background: var(--ink); color: var(--paper);
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px;
      margin-top: 1px;
    }
    .reveal .chart-side .options-key .key-row .text {
      flex: 1;
      color: var(--ink);
      white-space: normal;
      word-break: break-word;
    }
    .reveal .chart-side .options-key .key-row.correct {
      background: var(--mint);
    }
    .reveal .chart-side .options-key .key-row.correct .text::after {
      content: " ✓";
      font-weight: 700;
      color: var(--purple-dark);
    }

    .reveal .leader-side {
      display: flex; flex-direction: column;
      background: var(--paper);
      border: 4px solid var(--ink);
      border-radius: var(--radius);
      padding: clamp(14px, 2vh, 28px);
      box-shadow: var(--shadow);
      overflow-y: auto;
      min-height: 0;
    }
    .reveal .leader-side h3 {
      margin: 0 0 clamp(10px, 1.5vh, 18px);
      padding: 6px 14px;
      background: var(--purple);
      color: var(--paper);
      border: 3px solid var(--ink);
      border-radius: 999px;
      box-shadow: var(--shadow-sm);
      font-size: 16px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      align-self: flex-start;
    }
    .reveal .leader-row {
      display: flex; align-items: center; gap: clamp(10px, 1.4vw, 18px);
      padding: clamp(7px, 1.1vh, 12px) clamp(12px, 1.4vw, 18px);
      border: 3px solid var(--ink);
      border-radius: var(--radius-sm);
      margin-bottom: clamp(4px, 0.7vh, 8px);
      background: #fff;
      box-shadow: var(--shadow-sm);
    }
    .reveal .leader-row .pos {
      flex: 0 0 clamp(30px, min(2.8vw, 4vh), 44px); height: clamp(30px, min(2.8vw, 4vh), 44px); border-radius: 50%;
      background: var(--yellow);
      border: 3px solid var(--ink);
      color: var(--ink);
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: clamp(12px, min(1.2vw, 1.7vh), 18px);
    }
    .reveal .leader-row:nth-child(2) .pos { background: var(--mint); }
    .reveal .leader-row:nth-child(3) .pos { background: var(--coral); color: var(--paper); }
    .reveal .leader-row .name {
      flex: 1;
      font-size: clamp(13px, min(1.4vw, 2vh), 22px);
      font-weight: 700;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      transition: filter 600ms ease-out;
      color: var(--ink);
    }
    .reveal .leader-row .pts {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: clamp(14px, min(1.5vw, 2.2vh), 26px);
      color: var(--purple-dark);
    }
    .reveal .leader-row.blurred .name {
      filter: blur(10px);
      user-select: none;
    }
    .reveal .leader-side .empty {
      padding: 24px 16px;
      color: var(--ink); opacity: 0.55; font-style: italic;
      font-size: 16px; text-align: center;
    }

    /* ============== FINISHED (Stage D — two phases) ============== */
    .finished {
      flex: 1;
      position: relative;
      width: 100%;
    }
    .finished .phase {
      position: absolute;
      inset: 0;
      display: flex; flex-direction: column; align-items: center;
      transition: opacity 600ms ease-in-out;
    }
    .finished .phase-blurred  { opacity: 1; }
    .finished .phase-revealed { opacity: 0; pointer-events: none; }
    .finished.revealed .phase-blurred  { opacity: 0; pointer-events: none; }
    .finished.revealed .phase-revealed { opacity: 1; pointer-events: auto; }

    .finished .glow-pulse {
      position: absolute; inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center,
        rgba(255, 215, 0, 0.32) 0%,
        rgba(255, 215, 0, 0.10) 30%,
        transparent 60%);
      opacity: 0;
    }
    .finished.animate.revealed .glow-pulse {
      animation: glowPulse 3s ease-out 600ms;
    }
    @keyframes glowPulse {
      0%   { opacity: 0; transform: scale(0.6); }
      40%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.3); }
    }

    /* PHASE A — final standings list */
    .finished .standard-title {
      margin: 0 0 clamp(14px, 2.2vh, 28px);
      padding: clamp(10px, 1.6vh, 18px) clamp(28px, 4vw, 48px);
      background: linear-gradient(135deg, var(--yellow), #fff8b0);
      border: 5px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      font-size: clamp(32px, min(5.5vw, 8vh), 76px);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
      text-align: center;
    }
    .finished .top-10-list {
      width: 100%;
      max-width: 880px;
      margin-bottom: clamp(10px, 1.8vh, 24px);
    }
    .finished .top-10-list .row {
      display: flex; align-items: center; gap: clamp(12px, 1.4vw, 18px);
      padding: clamp(7px, 1.1vh, 12px) clamp(16px, 2.2vw, 24px);
      border: 3px solid var(--ink);
      border-radius: var(--radius-sm);
      margin-bottom: clamp(5px, 0.7vh, 8px);
      background: var(--paper);
      box-shadow: var(--shadow-sm);
    }
    .finished .top-10-list .row .pos {
      flex: 0 0 60px;
      font-weight: 700; color: var(--ink); opacity: 0.55;
      font-variant-numeric: tabular-nums;
      font-size: clamp(16px, min(1.6vw, 2.2vh), 24px);
    }
    .finished .top-10-list .row .name {
      flex: 1;
      font-size: clamp(16px, min(1.8vw, 2.4vh), 26px);
      font-weight: 700;
      color: var(--ink);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      transition: filter 800ms ease-out;
    }
    .finished .top-10-list .row.blurred .name {
      filter: blur(10px);
      user-select: none;
    }
    .finished .top-10-list .row .pts {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: clamp(16px, min(1.8vw, 2.4vh), 28px);
      color: var(--purple-dark);
    }
    .finished .thanks-msg {
      margin-top: 16px;
      padding: clamp(12px, 1.6vh, 16px) clamp(20px, 2.8vw, 36px);
      background: var(--mint);
      border: 4px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      font-size: clamp(20px, min(3vw, 4vh), 46px);
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .finished .top-10-list .empty {
      padding: 36px 0;
      color: var(--ink); opacity: 0.55; font-style: italic;
      font-size: clamp(16px, 1.6vw, 22px);
      text-align: center;
    }

    /* PHASE B — celebration */
    .finished .celebration-title {
      margin: 0 0 clamp(16px, 2.5vh, 36px);
      padding: clamp(10px, 1.6vh, 18px) clamp(28px, 4vw, 52px);
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-warm) 100%);
      border: 5px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      font-size: clamp(34px, min(6vw, 9vh), 92px);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
      text-align: center;
    }
    .finished.animate.revealed .celebration-title {
      animation: titlePop 1200ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes titlePop {
      0%   { transform: scale(0.4); opacity: 0; }
      50%  { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .finished .podium {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: clamp(16px, 2vw, 28px);
      align-items: end;
      width: 100%;
      max-width: 1100px;
      margin-bottom: clamp(16px, 2.5vh, 36px);
    }
    .finished .pillar {
      display: flex; flex-direction: column; align-items: center;
      gap: clamp(6px, 1vh, 12px);
      padding: clamp(12px, 2vh, 28px) clamp(14px, 2vw, 22px);
      background: var(--paper);
      border: 5px solid var(--ink);
      border-radius: var(--radius) var(--radius) 0 0;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .finished .pillar .medal {
      font-size: clamp(28px, min(4.5vw, 6vh), 56px);
      line-height: 1; margin-bottom: 4px;
      filter: drop-shadow(3px 3px 0 var(--ink));
    }
    .finished .pillar .name {
      font-size: clamp(16px, min(1.8vw, 2.6vh), 28px);
      font-weight: 700;
      color: var(--ink);
      max-width: 100%;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .finished .pillar .score {
      font-size: clamp(24px, min(3.2vw, 4.6vh), 50px);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--purple-dark);
    }
    .finished .pillar.gold {
      padding-bottom: clamp(28px, 4.5vh, 64px);
      background: linear-gradient(180deg, var(--gold) 0%, #fff8b0 100%);
      box-shadow: 8px 8px 0 var(--ink), 0 0 60px rgba(255, 215, 0, 0.45);
    }
    .finished .pillar.silver {
      padding-bottom: clamp(18px, 3vh, 40px);
      background: linear-gradient(180deg, #e8e8e8 0%, #f8f8f8 100%);
    }
    .finished .pillar.bronze {
      padding-bottom: clamp(12px, 2vh, 24px);
      background: linear-gradient(180deg, #e8a168 0%, #f4cba0 100%);
    }
    .finished.animate.revealed .pillar {
      animation: pillarPop 700ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .finished.animate.revealed .pillar.silver { animation-delay: 600ms; }
    .finished.animate.revealed .pillar.bronze { animation-delay: 900ms; }
    .finished.animate.revealed .pillar.gold   { animation-delay: 1200ms; }
    @keyframes pillarPop {
      0%   { opacity: 0; transform: scale(0.4) translateY(60px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .finished .also-rans {
      width: 100%; max-width: 720px;
      padding: clamp(8px, 1.2vh, 12px) clamp(16px, 2.2vw, 24px);
      background: var(--paper);
      border: 4px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
    }
    .finished .also-rans .row {
      display: flex; align-items: center; gap: clamp(12px, 1.4vw, 18px);
      padding: clamp(5px, 0.8vh, 10px) 8px;
      border-bottom: 2px dashed var(--ink);
      font-size: clamp(13px, min(1.3vw, 1.9vh), 19px);
    }
    .finished .also-rans .row:last-child { border-bottom: none; }
    .finished .also-rans .row .pos {
      flex: 0 0 44px;
      font-weight: 700; color: var(--ink); opacity: 0.55;
      font-variant-numeric: tabular-nums;
    }
    .finished .also-rans .row .name {
      flex: 1; font-weight: 700; color: var(--ink);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .finished .also-rans .row .pts {
      font-variant-numeric: tabular-nums; font-weight: 700;
      color: var(--purple-dark);
    }

    /* Confetti — hand-rolled to avoid an extra CDN dependency the night
       before the live event. Same logic as before; JS preserved. */
    .confetti-container {
      position: absolute; inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 50;
    }
    .confetti-piece {
      position: absolute;
      top: -60px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="topbar">
    <img src="/logo.png" alt="" class="logo" onerror="this.style.display='none'">
    <h1>Live Quiz</h1>
    <div class="meta" id="topmeta"></div>
  </div>

  <!-- ============== LOBBY ============== -->
  <div class="stage" id="stage-lobby">
    <div class="lobby">
      <div class="left">
        <div class="kicker">Scan or use the code</div>
        <h2>Join the<br>Quiz</h2>
        <div class="url" id="join-url">https://quizs.live/play</div>
        <div class="code-display">
          <div class="code-label">Room code</div>
          <div class="code-value" id="room-code">----</div>
        </div>
      </div>
      <div class="right">
        <div class="qr-wrap">
          <div id="qr-target"></div>
        </div>
        <div class="player-counter">
          <div class="label">Players Joined</div>
          <div class="num" id="lobby-count">0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============== PREVIEW ============== -->
  <div class="stage hidden" id="stage-preview">
    <div class="preview">
      <div class="preview-label">Get ready</div>
      <h2 class="preview-q-text" id="p-q-text">…</h2>
      <div class="preview-counter" id="p-q-counter">Question 1 of 10</div>
    </div>
  </div>

  <!-- ============== QUESTION ============== -->
  <div class="stage hidden" id="stage-question">
    <div class="question">
      <div class="qmeta">
        <span class="dot"></span>
        <span id="q-counter">Question 1 of 10</span>
      </div>
      <h2 class="q-text" id="q-text">…</h2>
      <div class="opts" id="q-opts"></div>
      <div class="footer">
        <div class="answers">
          <div class="label">Answers in</div>
          <div class="big-num"><span id="ans-count">0</span><span class="of"> / <span id="ans-total">0</span></span></div>
        </div>
        <div class="timer-block">
          <div class="label">Time left</div>
          <div class="big-num"><span class="timer-num" id="q-timer">--</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============== REVEAL ============== -->
  <div class="stage hidden" id="stage-reveal">
    <div class="reveal">
      <div class="chart-side">
        <h3 class="q-text" id="r-q-text">…</h3>
        <div class="pct"><span class="big" id="r-pct">0</span>% answered correctly</div>
        <div class="chart-wrap">
          <canvas id="reveal-chart"></canvas>
        </div>
        <div class="options-key" id="options-key"></div>
      </div>
      <div class="leader-side">
        <h3>Top 10 — Live</h3>
        <div id="leader-rows"></div>
      </div>
    </div>
  </div>

  <!-- ============== FINISHED (Stage D) ============== -->
  <div class="stage hidden" id="stage-finished">
    <div class="finished" id="finished-container">
      <div class="phase phase-blurred">
        <h2 class="standard-title">Final Standings</h2>
        <div class="top-10-list" id="finished-list"></div>
        <div class="thanks-msg">Thanks for participating! 🎉</div>
      </div>
      <div class="phase phase-revealed">
        <h2 class="celebration-title">🏆 Champions</h2>
        <div class="podium" id="finished-podium"></div>
        <div class="also-rans" id="finished-also-rans"></div>
      </div>
      <div class="glow-pulse"></div>
      <div class="confetti-container" id="confetti"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    'use strict';

    const stages = {
      lobby:    document.getElementById('stage-lobby'),
      preview:  document.getElementById('stage-preview'),
      question: document.getElementById('stage-question'),
      reveal:   document.getElementById('stage-reveal'),
      finished: document.getElementById('stage-finished'),
    };
    function showStage(name) {
      Object.entries(stages).forEach(([k, el]) => el.classList.toggle('hidden', k !== name));
    }

    function displayName(p) {
      if (!p) return '—';
      const first = (p.firstName || '').trim();
      const last  = (p.lastName  || '').trim();
      const full = (first + ' ' + last).trim();
      return full || '—';
    }

    const playUrl = `${location.origin}/play`;
    document.getElementById('join-url').textContent = playUrl;

    const roomCodeEl = document.getElementById('room-code');
    let qrCodeRendered = false;

    function renderQRCode(targetUrl) {
      const target = document.getElementById('qr-target');
      target.innerHTML = '';
      if (window.QRCode) {
        new QRCode(target, {
          text: targetUrl,
          width: 480,
          height: 480,
          colorDark:  '#000000',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M,
        });
        qrCodeRendered = true;
      } else if (!qrCodeRendered) {
        const wrap = document.querySelector('.qr-wrap');
        wrap.innerHTML = `<div class="placeholder">QR unavailable. Visit:<br><br><strong>${targetUrl}</strong></div>`;
      }
    }

    renderQRCode(playUrl);

    const ansCountEl = document.getElementById('ans-count');
    const ansTotalEl = document.getElementById('ans-total');
    let displayedCount = 0;
    let targetCount    = 0;
    function tweenAnswerCount() {
      if (displayedCount === targetCount) return;
      const next = displayedCount + (targetCount - displayedCount) * 0.3;
      displayedCount = Math.abs(next - targetCount) < 0.5 ? targetCount : next;
      ansCountEl.textContent = Math.round(displayedCount).toLocaleString();
    }
    setInterval(tweenAnswerCount, 33);

    let revealChart = null;
    function destroyRevealChart() {
      if (revealChart) {
        revealChart.destroy();
        revealChart = null;
      }
    }

    const finishedContainer = document.getElementById('finished-container');
    const finishedList      = document.getElementById('finished-list');
    const finishedPodium    = document.getElementById('finished-podium');
    const finishedAlsoRans  = document.getElementById('finished-also-rans');
    const confettiContainer = document.getElementById('confetti');
    let confettiCleanupTimer = null;

    const socket = io({ transports: ['websocket'], auth: { role: 'board' } });

    socket.on('state:meta', (m) => {
      if (!m || !m.code) return;
      roomCodeEl.textContent = m.code;
      renderQRCode(`${playUrl}?code=${m.code}`);
    });

    socket.on('state:lobby', (p) => {
      stopTimer();
      destroyRevealChart();
      clearConfetti();
      finishedContainer.classList.remove('revealed', 'animate');
      document.getElementById('lobby-count').textContent = (p.playerCount || 0).toLocaleString();
      document.getElementById('topmeta').textContent = '';
      showStage('lobby');
    });

    socket.on('state:question_preview', (q) => {
      stopTimer();
      destroyRevealChart();
      clearConfetti();
      finishedContainer.classList.remove('revealed', 'animate');
      displayedCount = 0;
      targetCount = 0;
      ansCountEl.textContent = '0';
      ansTotalEl.textContent = '0';

      document.getElementById('p-q-text').textContent = q.text || '…';
      const num = (q.index || 0) + 1;
      const total = q.total || 0;
      document.getElementById('p-q-counter').textContent =
        total ? `Question ${num} of ${total}` : `Question ${num}`;
      document.getElementById('topmeta').textContent =
        total ? `${num} / ${total}` : `${num}`;
      showStage('preview');
    });

    socket.on('state:question', (q) => {
      destroyRevealChart();
      clearConfetti();
      finishedContainer.classList.remove('revealed', 'animate');
      document.getElementById('q-counter').textContent = `Question ${q.index + 1} of ${q.total}`;
      document.getElementById('q-text').textContent = q.text;
      const optsEl = document.getElementById('q-opts');
      optsEl.innerHTML = '';
      const letters = ['A', 'B', 'C', 'D'];
      q.options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'opt';
        div.innerHTML = `<span class="letter">${letters[i]}</span><span>${escapeHtml(opt)}</span>`;
        optsEl.appendChild(div);
      });

      displayedCount = 0;
      targetCount = 0;
      ansCountEl.textContent = '0';

      const skewMs = Date.now() - q.serverNow;
      startTimer(q.endsAt + skewMs);

      document.getElementById('topmeta').textContent = `${q.index + 1} / ${q.total}`;
      showStage('question');
    });

    socket.on('state:answerCount', (a) => {
      targetCount = a.count || 0;
      ansTotalEl.textContent = (a.total || 0).toLocaleString();
    });

    socket.on('state:reveal', (r) => {
      stopTimer();
      document.getElementById('r-q-text').textContent = r.questionText || '';
      document.getElementById('r-pct').textContent = (r.pctCorrect || 0);

      const styles = getComputedStyle(document.documentElement);
      const greenColor = styles.getPropertyValue('--green').trim() || '#4ef2c6';
      const redColor   = styles.getPropertyValue('--red').trim()   || '#ff5c7a';
      const letters = ['A', 'B', 'C', 'D'];
      // Stage I.1: x-axis shows just letters; full text in legend below.
      const labels = letters.slice();
      const colors = labels.map((_, i) => i === r.correctOption ? greenColor : redColor);

      destroyRevealChart();
      const ctx = document.getElementById('reveal-chart').getContext('2d');
      revealChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: r.distribution || [0,0,0,0],
            backgroundColor: colors,
            borderColor: '#141018',
            borderWidth: 3,
            borderRadius: 8,
            borderSkipped: false,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 700, easing: 'easeOutCubic' },
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          scales: {
            x: {
              ticks: {
                color: '#141018',
                font: { family: 'Fredoka', weight: '700', size: 32 },
                maxRotation: 0,
                minRotation: 0,
                padding: 6,
              },
              grid: { display: false },
            },
            y: {
              beginAtZero: true,
              ticks: {
                color: '#141018',
                font: { family: 'Fredoka', weight: '600', size: 14 },
                precision: 0,
              },
              grid: { color: 'rgba(20,16,24,0.08)' },
            },
          },
        },
      });

      // Stage I.1: render options legend below chart with full text.
      const keyEl = document.getElementById('options-key');
      keyEl.innerHTML = '';
      (r.options || []).forEach((opt, i) => {
        const row = document.createElement('div');
        row.className = 'key-row' + (i === r.correctOption ? ' correct' : '');
        row.innerHTML =
          `<span class="letter">${letters[i]}</span>` +
          `<span class="text">${escapeHtml(opt)}</span>`;
        keyEl.appendChild(row);
      });

            const lb = r.leaderboard || [];
      const lbEl = document.getElementById('leader-rows');
      lbEl.innerHTML = '';
      const list = lb.slice(0, 10);
      if (list.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'No players yet.';
        lbEl.appendChild(empty);
      } else {
        list.forEach((p, i) => {
          const row = document.createElement('div');
          row.className = 'leader-row' + (i < 3 ? ' blurred' : '');
          row.innerHTML =
            `<span class="pos">${i + 1}</span>` +
            `<span class="name">${escapeHtml(displayName(p))}</span>` +
            `<span class="pts">${(p.score || 0).toLocaleString()}</span>`;
          lbEl.appendChild(row);
        });
      }

      showStage('reveal');
    });

    socket.on('state:finished', (f) => {
      stopTimer();
      destroyRevealChart();

      const top10 = (f && f.top10) ? f.top10.slice(0, 10) : [];
      renderTop10List(top10);
      renderPodiumPhase(top10);

      const isRevealed = !!(f && f.podiumRevealed);
      finishedContainer.classList.toggle('revealed', isRevealed);
      finishedContainer.classList.remove('animate');
      clearConfetti();

      document.getElementById('topmeta').textContent = 'Final';
      showStage('finished');
    });

    socket.on('state:podiumRevealed', () => {
      if (finishedContainer.classList.contains('revealed')) return;

      finishedContainer.classList.add('revealed', 'animate');
      launchConfetti();

      setTimeout(() => {
        finishedContainer.classList.remove('animate');
      }, 4000);
    });

    socket.on('state:reset', () => {
      stopTimer();
      destroyRevealChart();
      clearConfetti();
      finishedContainer.classList.remove('revealed', 'animate');
      displayedCount = 0;
      targetCount = 0;
      ansCountEl.textContent = '0';
      ansTotalEl.textContent = '0';
    });

    function renderTop10List(top10) {
      finishedList.innerHTML = '';
      if (top10.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'No players to show.';
        finishedList.appendChild(empty);
        return;
      }
      top10.forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'row' + (i < 3 ? ' blurred' : '');
        row.innerHTML =
          `<span class="pos">#${i + 1}</span>` +
          `<span class="name">${escapeHtml(displayName(p))}</span>` +
          `<span class="pts">${(p.score || 0).toLocaleString()}</span>`;
        finishedList.appendChild(row);
      });
    }

    function renderPodiumPhase(top10) {
      finishedPodium.innerHTML = '';
      finishedAlsoRans.innerHTML = '';

      if (top10.length === 0) {
        return;
      }

      const top3 = top10.slice(0, 3);
      const medals = ['🥇', '🥈', '🥉'];
      const classes = ['gold', 'silver', 'bronze'];
      const visualOrder = [1, 0, 2];
      visualOrder.forEach((rank) => {
        const p = top3[rank];
        if (!p) return;
        const div = document.createElement('div');
        div.className = `pillar ${classes[rank]}`;
        div.innerHTML =
          `<div class="medal">${medals[rank]}</div>` +
          `<div class="name">${escapeHtml(displayName(p))}</div>` +
          `<div class="score">${(p.score || 0).toLocaleString()}</div>`;
        finishedPodium.appendChild(div);
      });

      top10.slice(3, 10).forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML =
          `<span class="pos">#${i + 4}</span>` +
          `<span class="name">${escapeHtml(displayName(p))}</span>` +
          `<span class="pts">${(p.score || 0).toLocaleString()}</span>`;
        finishedAlsoRans.appendChild(row);
      });
    }

    function launchConfetti() {
      clearConfetti();
      const emojis = ['🎉', '🎊', '✨', '⭐', '💫'];
      const fragment = document.createDocumentFragment();
      for (let i = 0; i < 60; i++) {
        const span = document.createElement('span');
        span.className = 'confetti-piece';
        span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        span.style.left = Math.random() * 100 + 'vw';
        span.style.fontSize = (24 + Math.random() * 20) + 'px';
        span.style.animationDelay = (Math.random() * 1.2) + 's';
        span.style.animationDuration = (3 + Math.random() * 3) + 's';
        fragment.appendChild(span);
      }
      confettiContainer.appendChild(fragment);
      if (confettiCleanupTimer) clearTimeout(confettiCleanupTimer);
      confettiCleanupTimer = setTimeout(clearConfetti, 8000);
    }

    function clearConfetti() {
      if (confettiCleanupTimer) {
        clearTimeout(confettiCleanupTimer);
        confettiCleanupTimer = null;
      }
      confettiContainer.innerHTML = '';
    }

    let timerInterval = null;
    function startTimer(endsAtLocalMs) {
      stopTimer();
      const el = document.getElementById('q-timer');
      function tick() {
        const remaining = Math.max(0, endsAtLocalMs - Date.now());
        const sec = Math.ceil(remaining / 1000);
        el.textContent = sec;
        el.classList.toggle('warn', sec <= 5);
        if (remaining <= 0) stopTimer();
      }
      tick();
      timerInterval = setInterval(tick, 200);
    }
    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
  </script>
</body>
</html>
