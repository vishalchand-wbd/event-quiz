<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz — Host Console</title>
  <!-- favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       Funky / neobrutalist theme — Stage I.
       Same tokens as /play and /board. Host console has more
       structural elements (stats cards, badges, action buttons,
       leaderboard) — all neobrutalist-styled with hard shadows.

       Stage I: mobile-responsive layout (≤640px). Stats grid stacks
       single column, action buttons stack full-width with 48px min
       tap height, hard shadows scale down so they don't push past
       the viewport edge, q-display options stay 2x2 but smaller.
       ============================================================ */
    :root {
      --purple: #7b2fff;
      --purple-dark: #4a0fc7;
      --yellow: #ffe600;
      --yellow-dark: #d4bc00;
      --ink: #141018;
      --paper: #fef7ff;
      --mint: #4ef2c6;
      --coral: #ff5c7a;
      --shadow: 6px 6px 0 var(--ink);
      --shadow-sm: 4px 4px 0 var(--ink);
      --shadow-xs: 3px 3px 0 var(--ink);
      --radius: 16px;
      --radius-sm: 12px;
      --font: 'Fredoka', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      font-family: var(--font);
      color: var(--ink);
      font-size: 16px; line-height: 1.45;
    }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, #fff2a8 0%, transparent 45%),
        radial-gradient(circle at 80% 10%, #e4d4ff 0%, transparent 40%),
        linear-gradient(165deg, #ffeef9 0%, #dcd6ff 40%, #b9f0ff 100%);
      background-attachment: fixed;
    }

    /* ---------- Top bar ---------- */
    .topbar {
      padding: 16px 24px;
      display: flex; align-items: center; gap: 14px;
    }
    .topbar .logo {
      height: 34px;
      filter: drop-shadow(2px 2px 0 var(--ink));
    }
    .topbar h1 {
      margin: 0; font-size: 18px; font-weight: 700;
      letter-spacing: 0.02em;
    }
    .topbar .label {
      padding: 4px 10px;
      background: var(--purple); color: var(--paper);
      border: 3px solid var(--ink);
      border-radius: 999px;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.06em;
      box-shadow: var(--shadow-xs);
    }
    .topbar .conn-status {
      margin-left: auto;
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: var(--yellow);
      font-size: 13px; font-weight: 600;
      box-shadow: var(--shadow-xs);
    }
    .topbar .conn-status .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--ink);
    }
    .topbar .conn-status.online   { background: var(--mint); }
    .topbar .conn-status.offline  { background: var(--coral); color: var(--paper); }
    .topbar .conn-status.offline .dot { background: var(--paper); }

    main { max-width: 980px; margin: 0 auto; padding: 8px 24px 32px; }

    /* ---------- Card ---------- */
    .card {
      background: var(--paper);
      border: 4px solid var(--ink);
      border-radius: var(--radius);
      padding: 26px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }
    .card h2 {
      margin: 0 0 6px; font-size: 22px; font-weight: 700;
      letter-spacing: -0.01em;
    }
    .card .sub {
      margin: 0 0 22px; opacity: 0.75; font-size: 14px; font-weight: 500;
    }

    /* ---------- Token form ---------- */
    .token-form { display: flex; flex-direction: column; gap: 14px; max-width: 480px; }
    .token-form label {
      font-size: 12px; font-weight: 700; color: var(--ink);
      text-transform: uppercase; letter-spacing: 0.08em;
      display: block; margin-bottom: 6px;
    }
    .token-form input {
      width: 100%; padding: 13px 15px;
      font-size: 15px; font-family: inherit; font-weight: 500;
      letter-spacing: 0.02em;
      border: 3px solid var(--ink); border-radius: var(--radius-sm);
      background: #fff; color: var(--ink);
      outline: none;
      box-shadow: var(--shadow-sm);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .token-form input:focus {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--purple);
    }

    /* ---------- Buttons ---------- */
    .btn {
      padding: 13px 22px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      border: 4px solid var(--ink); border-radius: var(--radius-sm);
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.15s;
    }
    .btn-primary    { background: var(--purple); color: var(--paper); }
    .btn-secondary  { background: var(--paper);  color: var(--ink); }
    .btn-danger     { background: var(--yellow); color: var(--ink); }
    /* Stage D: podium-reveal button gets a yellow→coral gradient with extra
       glow to feel celebratory and visually distinct from the main actions. */
    .btn-celebrate  {
      background: linear-gradient(135deg, var(--yellow) 0%, var(--coral) 100%);
      color: var(--ink);
    }
    .btn:active:not(:disabled) {
      transform: translate(3px, 3px);
      box-shadow: 3px 3px 0 var(--ink);
    }
    .btn:disabled {
      opacity: 0.45; cursor: not-allowed;
      box-shadow: var(--shadow-sm);
    }

    .err {
      color: var(--coral); font-size: 14px; min-height: 18px;
      font-weight: 600;
    }

    /* ---------- Stats row ---------- */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 22px;
    }
    .stat {
      padding: 16px 18px;
      background: #fff;
      border: 3px solid var(--ink); border-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
    }
    .stat .label {
      font-size: 11px; font-weight: 700; color: var(--ink);
      text-transform: uppercase; letter-spacing: 0.08em;
      opacity: 0.75;
    }
    .stat .value {
      font-size: 36px; font-weight: 700;
      font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
      margin-top: 4px;
      line-height: 1.05;
    }
    .stat .value.large { font-size: 44px; }

    /* ---------- Question display ---------- */
    .q-display {
      padding: 22px 24px;
      background: linear-gradient(135deg, #fff8b0, var(--yellow));
      border: 3px solid var(--ink); border-radius: var(--radius);
      margin-bottom: 22px;
      box-shadow: var(--shadow-sm);
    }
    .q-display .q-meta {
      display: inline-block;
      font-size: 11px; font-weight: 700; color: var(--ink);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 12px;
      padding: 4px 10px;
      background: var(--paper);
      border: 2px solid var(--ink);
      border-radius: 999px;
    }
    .q-display .q-text {
      font-size: 22px; font-weight: 700; line-height: 1.3;
      margin: 0 0 18px; letter-spacing: -0.01em;
    }
    .q-display .opts {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      transition: opacity 200ms ease-out;
    }
    /* Mini colored tiles in the host preview — same yellow/mint/purple/coral
       pattern as /play and /board, just compact. JS sets class="opt" + may
       add ".correct" on reveal; nth-child gives the color regardless. */
    .q-display .opt {
      padding: 12px 14px;
      background: #fff;
      border: 3px solid var(--ink); border-radius: var(--radius-sm);
      display: flex; align-items: center; gap: 10px;
      font-size: 15px; font-weight: 600;
      box-shadow: var(--shadow-xs);
    }
    .q-display .opt:nth-child(1) { background: var(--yellow); color: var(--ink); }
    .q-display .opt:nth-child(2) { background: var(--mint);   color: var(--ink); }
    .q-display .opt:nth-child(3) { background: var(--purple); color: var(--paper); }
    .q-display .opt:nth-child(4) { background: var(--coral);  color: var(--paper); }
    .q-display .opt .letter {
      flex: 0 0 26px; height: 26px; border-radius: 50%;
      background: var(--ink); color: var(--paper);
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px;
    }
    .q-display .opt:nth-child(3) .letter,
    .q-display .opt:nth-child(4) .letter {
      background: var(--paper); color: var(--ink);
    }
    .q-display .opt.correct {
      outline: 4px solid var(--ink);
      outline-offset: 2px;
    }
    .q-display.preview .opts { opacity: 0.45; }

    /* ---------- Actions row ---------- */
    .actions {
      display: flex; gap: 12px;
      padding-top: 20px;
      border-top: 3px dashed var(--ink);
      align-items: center;
      flex-wrap: wrap;
    }
    .actions .btn { min-width: 160px; }
    .actions .spacer { flex: 1; }

    /* ---------- Badge (state pill) ---------- */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      box-shadow: var(--shadow-xs);
    }
    .badge.lobby    { background: var(--paper);  color: var(--ink); }
    .badge.preview  { background: var(--yellow); color: var(--ink); }
    .badge.active   { background: var(--coral);  color: var(--paper); }
    .badge.closed   { background: var(--ink);    color: var(--paper); }
    .badge.revealed { background: var(--mint);   color: var(--ink); }
    .badge.finished { background: var(--purple); color: var(--paper); }
    .badge.podiumRevealed {
      background: linear-gradient(135deg, var(--yellow) 0%, var(--coral) 100%);
      color: var(--ink);
    }
    .badge .pulse {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: currentColor;
      animation: hostpulse 1.4s ease-in-out infinite;
    }
    @keyframes hostpulse {
      0%, 100% { opacity: 0.4; transform: scale(0.8); }
      50%      { opacity: 1;   transform: scale(1.15); }
    }

    .header-meta {
      display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
    }
    .room-code {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 4px 12px;
      border: 3px dashed var(--ink); border-radius: 999px;
      font-size: 13px; font-weight: 600;
      background: rgba(255, 255, 255, 0.55);
    }
    .room-code .num {
      font-weight: 700;
      color: var(--purple-dark);
      font-size: 16px;
      letter-spacing: 0.12em;
      font-variant-numeric: tabular-nums;
    }

    /* ---------- Leaderboard ---------- */
    .reveal-leaderboard {
      margin-top: 18px;
      padding: 18px 20px;
      background: #fff;
      border: 3px solid var(--ink); border-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
    }
    .reveal-leaderboard h3 {
      font-size: 12px; font-weight: 700; color: var(--ink);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin: 0 0 12px;
    }
    .reveal-leaderboard .row {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 0;
      border-bottom: 2px solid #eee5f5;
    }
    .reveal-leaderboard .row:last-child { border-bottom: none; }
    .reveal-leaderboard .pos {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--yellow); color: var(--ink);
      border: 2px solid var(--ink);
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px;
    }
    .reveal-leaderboard .row:nth-child(2) .pos { background: var(--mint); }
    .reveal-leaderboard .row:nth-child(3) .pos { background: var(--coral); color: var(--paper); }
    .reveal-leaderboard .name {
      flex: 1; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .reveal-leaderboard .pts {
      font-variant-numeric: tabular-nums; font-weight: 700;
      color: var(--purple-dark);
    }
    .reveal-leaderboard .empty {
      padding: 14px 0; opacity: 0.6; font-size: 14px;
      font-style: italic;
    }

    /* ---------- Toast ---------- */
    .toast {
      position: fixed; left: 50%; bottom: 32px;
      transform: translateX(-50%) translateY(20px);
      padding: 12px 20px;
      background: var(--ink); color: var(--paper);
      border: 3px solid var(--ink);
      border-radius: var(--radius-sm);
      font-weight: 700; font-size: 14px;
      box-shadow: var(--shadow);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .hidden { display: none !important; }

    /* ============================================================
       Stage I — Mobile breakpoint (≤640px).
       Stacks layout into a single column, scales hard offset shadows
       down (4px instead of 6px) so neobrutalist border + shadow stack
       doesn't push past the viewport edge, and ensures all action
       buttons hit min 48px tap height.
       ============================================================ */
    @media (max-width: 640px) {
      :root {
        --shadow: 4px 4px 0 var(--ink);
        --shadow-sm: 3px 3px 0 var(--ink);
        --shadow-xs: 2px 2px 0 var(--ink);
      }

      .topbar {
        padding: 12px 14px; gap: 8px;
        flex-wrap: wrap;
      }
      .topbar .logo { height: 28px; }
      .topbar h1 { font-size: 16px; }
      .topbar .label { padding: 3px 8px; font-size: 11px; }
      .topbar .conn-status { padding: 4px 10px; font-size: 12px; }

      main { padding: 6px 14px 24px; }

      .card { padding: 18px 16px; margin-bottom: 16px; border-width: 3px; }
      .card h2 { font-size: 19px; }
      .card .sub { font-size: 13px; margin-bottom: 16px; }

      /* Game Console header row stacks. The inline-styled flex container
         already has flex-wrap; we just constrain header-meta to wrap as a
         row on mobile so badge + room-code sit on one line. */
      .header-meta {
        align-items: flex-start;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 8px;
      }

      .stats {
        grid-template-columns: 1fr;
        gap: 10px;
        margin-bottom: 16px;
      }
      .stat { padding: 12px 14px; border-width: 2px; }
      .stat .value { font-size: 26px; }
      .stat .value.large { font-size: 30px; }

      .q-display {
        padding: 14px 16px;
        margin-bottom: 16px;
        border-width: 2px;
      }
      .q-display .q-meta {
        font-size: 10px; padding: 3px 8px; margin-bottom: 10px;
      }
      .q-display .q-text { font-size: 17px; margin: 0 0 14px; line-height: 1.25; }
      .q-display .opts { gap: 8px; }
      .q-display .opt {
        padding: 10px 12px; font-size: 13px;
        border-width: 2px;
      }
      .q-display .opt .letter { flex: 0 0 22px; height: 22px; font-size: 11px; }

      .reveal-leaderboard {
        padding: 14px 16px; margin-top: 14px;
        border-width: 2px;
      }
      .reveal-leaderboard h3 { font-size: 11px; margin: 0 0 10px; }
      .reveal-leaderboard .row { padding: 8px 0; gap: 10px; }
      .reveal-leaderboard .pos { width: 26px; height: 26px; font-size: 12px; }
      .reveal-leaderboard .name { font-size: 14px; }
      .reveal-leaderboard .pts { font-size: 14px; }

      .actions {
        gap: 10px;
        padding-top: 16px;
        flex-direction: column;
        align-items: stretch;
      }
      .actions .btn {
        min-width: 0;
        width: 100%;
        min-height: 48px;
        padding: 14px 18px;
        font-size: 15px;
        border-width: 3px;
      }
      .actions .spacer { display: none; }

      .token-form input {
        font-size: 16px;
        padding: 12px 14px;
        border-width: 2px;
      }
      .btn { border-width: 3px; }

      .toast { bottom: 16px; padding: 10px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <img src="/logo.png" alt="" class="logo" onerror="this.style.display='none'">
    <h1>Live Quiz</h1>
    <span class="label">Host Console</span>
    <div class="conn-status offline" id="conn-status">
      <span class="dot"></span>
      <span id="conn-text">Disconnected</span>
    </div>
  </div>

  <main>

    <section id="view-token" class="card">
      <h2>Moderator access</h2>
      <p class="sub">Enter the host token printed by <code>install.sh</code> at deploy time.</p>
      <form class="token-form" id="token-form">
        <div>
          <label for="token">Host token</label>
          <input type="password" id="token" autocomplete="off" required>
        </div>
        <div class="err" id="token-err"></div>
        <div><button class="btn btn-primary" type="submit">Connect</button></div>
      </form>
    </section>

    <section id="view-game" class="card hidden">
      <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 22px; flex-wrap: wrap; gap: 14px;">
        <div>
          <h2 style="margin-bottom: 4px;">Game Console</h2>
          <p class="sub" style="margin-bottom: 0;">Server-authoritative scoring. Every action below is persisted.</p>
        </div>
        <div class="header-meta">
          <span class="badge lobby" id="state-badge"><span class="pulse"></span><span id="state-text">Lobby</span></span>
          <span class="room-code">Room code <span class="num" id="host-room-code">—</span></span>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="label">Question</div>
          <div class="value" id="stat-q">—</div>
        </div>
        <div class="stat">
          <div class="label" id="stat-mid-label">Players Joined</div>
          <div class="value large" id="stat-mid">0</div>
        </div>
        <div class="stat">
          <div class="label">Time Left</div>
          <div class="value" id="stat-time">—</div>
        </div>
      </div>

      <div class="q-display hidden" id="q-display">
        <div class="q-meta" id="q-meta">Current Question</div>
        <h3 class="q-text" id="q-text">…</h3>
        <div class="opts" id="q-opts"></div>
      </div>

      <div class="reveal-leaderboard hidden" id="reveal-leaderboard">
        <h3 id="leaderboard-title">Top 5 right now</h3>
        <div id="leaderboard-body"></div>
      </div>

      <div class="actions">
        <button class="btn btn-primary"   id="btn-advance"        disabled>Advance</button>
        <button class="btn btn-danger"    id="btn-reveal"         disabled>Reveal</button>
        <!-- Stage D: only visible in FINISHED state when podium not yet revealed -->
        <button class="btn btn-celebrate" id="btn-reveal-podium"  disabled hidden>🏆 Reveal Podium</button>
        <div class="spacer"></div>
        <button class="btn btn-secondary" id="btn-reset"          disabled>Reset</button>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    'use strict';

    const viewToken  = document.getElementById('view-token');
    const viewGame   = document.getElementById('view-game');
    const tokenForm  = document.getElementById('token-form');
    const tokenInput = document.getElementById('token');
    const tokenErr   = document.getElementById('token-err');
    const connStatus = document.getElementById('conn-status');
    const connText   = document.getElementById('conn-text');
    const stateBadge = document.getElementById('state-badge');
    const stateText  = document.getElementById('state-text');
    const roomCodeEl = document.getElementById('host-room-code');
    const statQ      = document.getElementById('stat-q');
    const statMidLab = document.getElementById('stat-mid-label');
    const statMid    = document.getElementById('stat-mid');
    const statTime   = document.getElementById('stat-time');
    const qDisplay   = document.getElementById('q-display');
    const qMeta      = document.getElementById('q-meta');
    const qText      = document.getElementById('q-text');
    const qOpts      = document.getElementById('q-opts');
    const lbWrap     = document.getElementById('reveal-leaderboard');
    const lbTitle    = document.getElementById('leaderboard-title');
    const lbBody     = document.getElementById('leaderboard-body');
    const btnAdvance = document.getElementById('btn-advance');
    const btnReveal  = document.getElementById('btn-reveal');
    const btnRevealPodium = document.getElementById('btn-reveal-podium');
    const btnReset   = document.getElementById('btn-reset');
    const toast      = document.getElementById('toast');

    let socket = null;
    let hostToken = null;
    let serverState = 'lobby';
    let lastQuestion = null;
    let lastReveal   = null;
    let lastAnswerCount = { count: 0, total: 0 };
    let lastPlayerCount = 0;
    let podiumRevealed = false;
    let timerInterval = null;
    let toastTimer = null;

    const urlToken = new URLSearchParams(window.location.search).get('token');
    if (urlToken) {
      tokenInput.value = urlToken;
    }

    tokenForm.addEventListener('submit', (e) => {
      e.preventDefault();
      tokenErr.textContent = '';
      const t = tokenInput.value.trim();
      if (!t) { tokenErr.textContent = 'Token required.'; return; }
      hostToken = t;
      connect();
    });

    function connect() {
      if (socket) socket.disconnect();
      socket = io({
        transports: ['websocket'],
        auth: { role: 'host', token: hostToken },
      });
      attachHandlers();
    }

    function attachHandlers() {
      socket.on('connect', () => {
        connStatus.classList.remove('offline'); connStatus.classList.add('online');
        connText.textContent = 'Connected';
        viewToken.classList.add('hidden');
        viewGame.classList.remove('hidden');
        updateButtonState();
      });

      socket.on('disconnect', () => {
        connStatus.classList.remove('online'); connStatus.classList.add('offline');
        connText.textContent = 'Disconnected — reconnecting…';
        updateButtonState();
      });

      socket.on('connect_error', (err) => {
        connText.textContent = 'Connection failed';
        tokenErr.textContent = err.message || 'Connection failed.';
        viewToken.classList.remove('hidden');
        viewGame.classList.add('hidden');
      });

      socket.on('error', (err) => {
        if (err && err.message) {
          tokenErr.textContent = err.message;
          viewToken.classList.remove('hidden');
          viewGame.classList.add('hidden');
        }
      });

      socket.on('state:meta', (m) => {
        roomCodeEl.textContent = (m && m.code) || '—';
      });

      socket.on('state:lobby', (p) => {
        serverState = 'lobby';
        lastQuestion = null;
        lastReveal = null;
        lastPlayerCount = p.playerCount || 0;
        podiumRevealed = false;
        statQ.textContent = '—';
        statMidLab.textContent = 'Players Joined';
        statMid.textContent = lastPlayerCount.toLocaleString();
        statTime.textContent = '—';
        qDisplay.classList.add('hidden');
        qDisplay.classList.remove('preview');
        lbWrap.classList.add('hidden');
        setBadge('lobby', 'Lobby');
        stopTimer();
        updateButtonState();
      });

      socket.on('state:question_preview', (q) => {
        serverState = 'preview';
        lastQuestion = q;
        lastReveal = null;

        statQ.textContent = `${(q.index || 0) + 1} / ${q.total}`;
        statMidLab.textContent = 'Players Joined';
        statMid.textContent = lastPlayerCount.toLocaleString();
        statTime.textContent = '—';

        qMeta.textContent = 'Preview — options hidden from players';
        renderQuestion(q, null);
        qDisplay.classList.add('preview');
        qDisplay.classList.remove('hidden');
        lbWrap.classList.add('hidden');

        setBadge('preview', 'Preview');
        stopTimer();
        updateButtonState();
      });

      socket.on('state:question', (q) => {
        serverState = (Date.now() < q.endsAt) ? 'active' : 'closed';
        lastQuestion = q;
        lastReveal = null;

        statQ.textContent = `${q.index + 1} / ${q.total}`;
        statMidLab.textContent = 'Answers In';
        statMid.textContent = `${lastAnswerCount.count.toLocaleString()} / ${lastAnswerCount.total.toLocaleString()}`;
        qMeta.textContent = 'Current Question';
        renderQuestion(q, null);
        qDisplay.classList.remove('preview');
        qDisplay.classList.remove('hidden');
        lbWrap.classList.add('hidden');

        const skewMs = Date.now() - q.serverNow;
        startTimer(q.endsAt + skewMs);

        setBadge(serverState, serverState === 'active' ? 'Live' : 'Time up');
        updateButtonState();
      });

      socket.on('state:answerCount', (a) => {
        lastAnswerCount = { count: a.count || 0, total: a.total || 0 };
        if (serverState === 'active' || serverState === 'closed') {
          statMidLab.textContent = 'Answers In';
          statMid.textContent = `${lastAnswerCount.count.toLocaleString()} / ${lastAnswerCount.total.toLocaleString()}`;
        }
        if (a.final) {
          serverState = 'closed';
          stopTimer();
          statTime.textContent = '0s';
          setBadge('closed', 'Time up');
          updateButtonState();
        }
      });

      socket.on('state:reveal', (r) => {
        serverState = 'revealed';
        lastReveal = r;
        qMeta.textContent = 'Current Question';
        renderQuestion(lastQuestion || { text: r.questionText, options: r.options }, r.correctOption);
        qDisplay.classList.remove('preview');
        qDisplay.classList.remove('hidden');
        lbTitle.textContent = 'Top 5 right now';
        renderLeaderboard(r.leaderboard || []);
        lbWrap.classList.remove('hidden');
        statMidLab.textContent = '% Correct';
        statMid.textContent = (r.pctCorrect || 0) + '%';
        statTime.textContent = '—';
        stopTimer();
        setBadge('revealed', 'Revealed');
        updateButtonState();
      });

      socket.on('state:finished', (f) => {
        serverState = 'finished';
        podiumRevealed = !!(f && f.podiumRevealed);
        statQ.textContent = '—';
        statMidLab.textContent = 'Game';
        statMid.textContent = 'Done';
        statTime.textContent = '—';
        qDisplay.classList.add('hidden');
        qDisplay.classList.remove('preview');
        lbTitle.textContent = 'Final Top 5';
        renderLeaderboard((f && f.top10) || []);
        lbWrap.classList.remove('hidden');
        setBadge(podiumRevealed ? 'podiumRevealed' : 'finished',
                 podiumRevealed ? 'Podium Revealed' : 'Finished');
        updateButtonState();
      });

      socket.on('state:podiumRevealed', () => {
        podiumRevealed = true;
        if (serverState === 'finished') {
          setBadge('podiumRevealed', 'Podium Revealed');
        }
        showToast('🏆 Podium revealed on screen');
        updateButtonState();
      });

      socket.on('state:reset', () => {
        lastAnswerCount = { count: 0, total: 0 };
        lastQuestion = null;
        lastReveal = null;
        podiumRevealed = false;
        showToast('Game reset — back to lobby');
      });
    }

    function displayName(p) {
      if (!p) return '—';
      const first = (p.firstName || '').trim();
      const last  = (p.lastName  || '').trim();
      const full = (first + ' ' + last).trim();
      return full || '—';
    }

    function setBadge(cls, text) {
      stateBadge.className = 'badge ' + cls;
      stateBadge.innerHTML = `<span class="pulse"></span><span>${text}</span>`;
    }

    function renderQuestion(q, correctIndex) {
      qText.textContent = q.text || '';
      qOpts.innerHTML = '';
      const letters = ['A', 'B', 'C', 'D'];
      (q.options || []).forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'opt' + (correctIndex === i ? ' correct' : '');
        div.innerHTML = `<span class="letter">${letters[i]}</span><span>${escapeHtml(opt)}</span>`;
        qOpts.appendChild(div);
      });
    }

    function renderLeaderboard(rows) {
      lbBody.innerHTML = '';
      const list = (rows || []).slice(0, 5);
      if (list.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'No players have scored yet.';
        lbBody.appendChild(empty);
        return;
      }
      list.forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML =
          `<span class="pos">${i + 1}</span>` +
          `<span class="name">${escapeHtml(displayName(p))}</span>` +
          `<span class="pts">${(p.score || 0).toLocaleString()}</span>`;
        lbBody.appendChild(row);
      });
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
    }

    btnAdvance.addEventListener('click', () => {
      if (btnAdvance.disabled) return;
      socket.emit('host:advance', {}, (ack) => {
        if (!ack || !ack.ok) console.warn('advance rejected:', ack && ack.error);
      });
    });

    btnReveal.addEventListener('click', () => {
      if (btnReveal.disabled) return;
      if (serverState === 'active') {
        if (!confirm('Question is still live. Reveal early and cut off remaining answers?')) return;
      }
      socket.emit('host:reveal', {}, (ack) => {
        if (!ack || !ack.ok) console.warn('reveal rejected:', ack && ack.error);
      });
    });

    btnRevealPodium.addEventListener('click', () => {
      if (btnRevealPodium.disabled) return;
      socket.emit('host:revealPodium', {}, (ack) => {
        if (!ack || !ack.ok) console.warn('revealPodium rejected:', ack && ack.error);
      });
    });

    btnReset.addEventListener('click', () => {
      if (btnReset.disabled) return;
      const msg = (serverState === 'finished')
        ? 'Start a new game?\n\nThis clears all players and scores from the previous round so a fresh game can begin. A new room code will be generated.'
        : 'Reset the game NOW?\n\nThis will clear all players and scores immediately, and rotate the room code. Use this only if the current game is unrecoverable. This cannot be undone.';
      if (!confirm(msg)) return;
      socket.emit('host:reset', {}, (ack) => {
        if (!ack || !ack.ok) console.warn('reset rejected:', ack && ack.error);
      });
    });

    function updateButtonState() {
      const connected = socket && socket.connected;

      btnAdvance.disabled = !connected || (
        serverState !== 'lobby' &&
        serverState !== 'preview' &&
        serverState !== 'revealed'
      );
      btnAdvance.textContent =
        serverState === 'lobby'    ? 'Start Quiz' :
        serverState === 'preview'  ? 'Reveal Options' :
        serverState === 'revealed' && lastQuestion && lastQuestion.index === lastQuestion.total - 1 ? 'Show Final Results' :
        serverState === 'revealed' ? 'Next Question' :
        serverState === 'finished' ? 'Finished' : 'Advance';

      btnReveal.disabled  = !connected || (serverState !== 'active' && serverState !== 'closed');
      btnReveal.textContent = serverState === 'active' ? 'Reveal Early' : 'Reveal';

      if (serverState === 'finished' && !podiumRevealed) {
        btnRevealPodium.hidden = false;
        btnRevealPodium.disabled = !connected;
      } else {
        btnRevealPodium.hidden = true;
        btnRevealPodium.disabled = true;
      }

      btnReset.disabled = !connected;
      if (serverState === 'finished') {
        btnReset.className = 'btn btn-primary';
        btnReset.textContent = 'Start New Game';
      } else {
        btnReset.className = 'btn btn-secondary';
        btnReset.textContent = 'Reset';
      }
    }

    function startTimer(endsAtLocalMs) {
      stopTimer();
      function tick() {
        const remaining = Math.max(0, endsAtLocalMs - Date.now());
        const sec = Math.ceil(remaining / 1000);
        statTime.textContent = sec + 's';
        if (remaining <= 0) {
          stopTimer();
        }
      }
      tick();
      timerInterval = setInterval(tick, 200);
    }
    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
  </script>
</body>
</html>
