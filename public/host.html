<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz — Host Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #0064FF;
      --brand-dark: #0050D0;
      --bg: #F5F7FB;
      --surface: #FFFFFF;
      --text: #0E1A2B;
      --muted: #6B7280;
      --line: #E5E7EB;
      --green: #15B886;
      --red: #E5484D;
      --amber: #F59E0B;
      --shadow: 0 1px 2px rgba(14,26,43,0.04), 0 8px 24px rgba(14,26,43,0.06);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: 'Manrope', system-ui, -apple-system, sans-serif;
      font-size: 16px; line-height: 1.5;
    }
    body { min-height: 100vh; }

    /* Top bar */
    .topbar {
      background: var(--brand); color: #fff;
      padding: 14px 24px;
      display: flex; align-items: center; gap: 14px;
    }
    .topbar .logo { height: 30px; filter: brightness(0) invert(1); }
    .topbar h1 {
      margin: 0; font-size: 16px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .topbar .label {
      margin-left: 6px; padding: 3px 8px;
      background: rgba(255,255,255,0.15);
      border-radius: 6px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .topbar .conn-status {
      margin-left: auto;
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600;
    }
    .topbar .conn-status .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .topbar .conn-status.online  .dot { background: #4ADE80; box-shadow: 0 0 8px #4ADE80; }
    .topbar .conn-status.offline .dot { background: #FCA5A5; }
    .topbar .conn-status.offline { background: var(--red); margin: -14px -24px -14px auto; padding: 14px 24px; }

    main { max-width: 960px; margin: 0 auto; padding: 28px 24px; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .card h2 {
      margin: 0 0 6px; font-size: 22px; font-weight: 800;
    }
    .card .sub {
      margin: 0 0 24px; color: var(--muted); font-size: 14px;
    }

    /* Token gate */
    .token-form { display: flex; flex-direction: column; gap: 14px; max-width: 480px; }
    .token-form label {
      font-size: 13px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .token-form input {
      width: 100%; padding: 14px 16px;
      font-size: 16px; font-family: 'JetBrains Mono', ui-monospace, monospace;
      letter-spacing: 0.02em;
      border: 2px solid var(--line); border-radius: 10px;
      background: #fff; color: var(--text);
      outline: none; transition: border-color 0.15s;
    }
    .token-form input:focus { border-color: var(--brand); }

    .btn {
      padding: 14px 22px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      border: none; border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s, opacity 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-primary    { background: var(--brand); color: #fff; }
    .btn-primary:active:not(:disabled)  { transform: scale(0.98); background: var(--brand-dark); }
    .btn-secondary  { background: var(--surface); color: var(--text); border: 1px solid var(--line); }
    .btn-secondary:hover:not(:disabled) { border-color: var(--brand); }
    .btn-danger     { background: var(--amber); color: #fff; }
    .btn-danger:active:not(:disabled)   { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .err { color: var(--red); font-size: 14px; min-height: 18px; }

    /* Stats grid */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat {
      padding: 18px 20px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 12px;
    }
    .stat .label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .stat .value {
      font-size: 36px; font-weight: 800;
      font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
      margin-top: 4px;
    }
    .stat .value.large { font-size: 44px; }

    /* Question display */
    .q-display {
      padding: 22px 24px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 12px;
      margin-bottom: 22px;
    }
    .q-display .q-meta {
      font-size: 12px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .q-display .q-text {
      font-size: 22px; font-weight: 700; line-height: 1.3;
      margin: 0 0 18px;
    }
    .q-display .opts {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .q-display .opt {
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: flex; align-items: center; gap: 10px;
      font-size: 15px;
    }
    .q-display .opt .letter {
      flex: 0 0 24px; height: 24px; border-radius: 50%;
      background: var(--brand); color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px;
    }
    .q-display .opt.correct {
      background: rgba(21, 184, 134, 0.12);
      border-color: var(--green);
    }
    .q-display .opt.correct .letter { background: var(--green); }

    /* Action row */
    .actions {
      display: flex; gap: 12px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      align-items: center;
    }
    .actions .btn { min-width: 160px; }
    .actions .spacer { flex: 1; }

    /* Status badge */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .badge.lobby    { background: rgba(0,100,255,0.10); color: var(--brand); }
    .badge.active   { background: rgba(245,158,11,0.12); color: var(--amber); }
    .badge.closed   { background: rgba(229,72,77,0.10);  color: var(--red); }
    .badge.revealed { background: rgba(21,184,134,0.12); color: var(--green); }
    .badge.finished { background: rgba(0,0,0,0.06); color: var(--text); }
    .badge .pulse {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: currentColor;
      animation: hostpulse 1.4s ease-in-out infinite;
    }
    @keyframes hostpulse {
      0%,100% { opacity: 0.4; transform: scale(0.8); }
      50%     { opacity: 1;   transform: scale(1.1); }
    }

    /* Room code — small reference for the moderator, sits below the state
       badge in the header row. Not a full stat tile — the room code is meta
       (which game session is this?) rather than a metric of the current game. */
    .header-meta {
      display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
    }
    .room-code {
      font-size: 13px; font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    .room-code .num {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-weight: 700;
      color: var(--brand);
      font-size: 15px;
      letter-spacing: 0.08em;
      margin-left: 4px;
    }

    /* Reveal card */
    .reveal-leaderboard {
      margin-top: 18px;
    }
    .reveal-leaderboard h3 {
      font-size: 13px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin: 0 0 10px;
    }
    .reveal-leaderboard .row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--line);
    }
    .reveal-leaderboard .row:last-child { border-bottom: none; }
    .reveal-leaderboard .pos {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--bg); color: var(--text);
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px;
    }
    .reveal-leaderboard .email { flex: 1; font-weight: 600; }
    .reveal-leaderboard .pts {
      font-variant-numeric: tabular-nums; font-weight: 700;
    }

    /* Transient toast for reset confirmation */
    .toast {
      position: fixed; left: 50%; bottom: 32px;
      transform: translateX(-50%) translateY(20px);
      padding: 12px 20px;
      background: var(--text); color: #fff;
      border-radius: 10px; font-weight: 600; font-size: 14px;
      box-shadow: 0 10px 30px rgba(14,26,43,0.25);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
    }
    .toast.show {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="topbar">
    <img src="/logo.png" alt="" class="logo" onerror="this.style.display='none'">
    <h1>Live Quiz</h1>
    <span class="label">Host Console</span>
    <div class="conn-status offline" id="conn-status">
      <span class="dot"></span>
      <span id="conn-text">Disconnected</span>
    </div>
  </div>

  <main>

    <!-- 1. Token gate -->
    <section id="view-token" class="card">
      <h2>Moderator access</h2>
      <p class="sub">Enter the host token printed by <code>install.sh</code> at deploy time.</p>
      <form class="token-form" id="token-form">
        <div>
          <label for="token">Host token</label>
          <input type="password" id="token" autocomplete="off" required>
        </div>
        <div class="err" id="token-err"></div>
        <div><button class="btn btn-primary" type="submit">Connect</button></div>
      </form>
    </section>

    <!-- 2. Connected — game state -->
    <section id="view-game" class="card hidden">
      <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 24px;">
        <div>
          <h2 style="margin-bottom: 0;">Game Console</h2>
          <p class="sub" style="margin-bottom: 0;">Server-authoritative scoring. Every action below is persisted.</p>
        </div>
        <div class="header-meta">
          <span class="badge lobby" id="state-badge"><span class="pulse"></span><span id="state-text">Lobby</span></span>
          <span class="room-code">Room code:<span class="num" id="host-room-code">—</span></span>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="label">Question</div>
          <div class="value" id="stat-q">—</div>
        </div>
        <div class="stat">
          <div class="label" id="stat-mid-label">Players Joined</div>
          <div class="value large" id="stat-mid">0</div>
        </div>
        <div class="stat">
          <div class="label">Time Left</div>
          <div class="value" id="stat-time">—</div>
        </div>
      </div>

      <!-- Current question display (shown during ACTIVE / CLOSED / REVEALED) -->
      <div class="q-display hidden" id="q-display">
        <div class="q-meta">Current Question</div>
        <h3 class="q-text" id="q-text">…</h3>
        <div class="opts" id="q-opts"></div>
      </div>

      <!-- Reveal leaderboard (shown during REVEALED) -->
      <div class="reveal-leaderboard hidden" id="reveal-leaderboard">
        <h3>Top 5 right now</h3>
        <div id="leaderboard-body"></div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="btn-advance" disabled>Advance</button>
        <button class="btn btn-danger"  id="btn-reveal" disabled>Reveal</button>
        <div class="spacer"></div>
        <button class="btn btn-secondary" id="btn-reset" disabled>Reset</button>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    'use strict';

    // ===== DOM refs =====
    const viewToken  = document.getElementById('view-token');
    const viewGame   = document.getElementById('view-game');
    const tokenForm  = document.getElementById('token-form');
    const tokenInput = document.getElementById('token');
    const tokenErr   = document.getElementById('token-err');
    const connStatus = document.getElementById('conn-status');
    const connText   = document.getElementById('conn-text');
    const stateBadge = document.getElementById('state-badge');
    const stateText  = document.getElementById('state-text');
    const roomCodeEl = document.getElementById('host-room-code');
    const statQ      = document.getElementById('stat-q');
    const statMidLab = document.getElementById('stat-mid-label');
    const statMid    = document.getElementById('stat-mid');
    const statTime   = document.getElementById('stat-time');
    const qDisplay   = document.getElementById('q-display');
    const qText      = document.getElementById('q-text');
    const qOpts      = document.getElementById('q-opts');
    const lbWrap     = document.getElementById('reveal-leaderboard');
    const lbBody     = document.getElementById('leaderboard-body');
    const btnAdvance = document.getElementById('btn-advance');
    const btnReveal  = document.getElementById('btn-reveal');
    const btnReset   = document.getElementById('btn-reset');
    const toast      = document.getElementById('toast');

    // ===== Local state =====
    let socket = null;
    let hostToken = null;
    let serverState = 'lobby';      // mirrors server's state machine
    let lastQuestion = null;        // last state:question payload
    let lastReveal   = null;        // last state:reveal payload
    let lastAnswerCount = { count: 0, total: 0 };
    let timerInterval = null;
    let toastTimer = null;

    // ===== Token gate =====
    // Allow ?token=... in URL for one-click access from a saved bookmark.
    const urlToken = new URLSearchParams(window.location.search).get('token');
    if (urlToken) {
      tokenInput.value = urlToken;
    }

    tokenForm.addEventListener('submit', (e) => {
      e.preventDefault();
      tokenErr.textContent = '';
      const t = tokenInput.value.trim();
      if (!t) { tokenErr.textContent = 'Token required.'; return; }
      hostToken = t;
      connect();
    });

    function connect() {
      if (socket) socket.disconnect();
      socket = io({
        transports: ['websocket'],
        auth: { role: 'host', token: hostToken },
      });
      attachHandlers();
    }

    function attachHandlers() {
      socket.on('connect', () => {
        connStatus.classList.remove('offline'); connStatus.classList.add('online');
        connText.textContent = 'Connected';
        viewToken.classList.add('hidden');
        viewGame.classList.remove('hidden');
        updateButtonState();
      });

      socket.on('disconnect', () => {
        connStatus.classList.remove('online'); connStatus.classList.add('offline');
        connText.textContent = 'Disconnected — reconnecting…';
        updateButtonState();   // disable buttons while disconnected
      });

      socket.on('connect_error', (err) => {
        connText.textContent = 'Connection failed';
        tokenErr.textContent = err.message || 'Connection failed.';
        viewToken.classList.remove('hidden');
        viewGame.classList.add('hidden');
      });

      socket.on('error', (err) => {
        // Server sent an error event (likely auth).
        if (err && err.message) {
          tokenErr.textContent = err.message;
          viewToken.classList.remove('hidden');
          viewGame.classList.add('hidden');
        }
      });

      // Room code arrives via state:meta — emitted on connect (sendCurrentStateTo
      // emits it first) and again after every host:reset (when the code rotates).
      socket.on('state:meta', (m) => {
        roomCodeEl.textContent = (m && m.code) || '—';
      });

      socket.on('state:lobby', (p) => {
        serverState = 'lobby';
        lastQuestion = null;
        lastReveal = null;
        statQ.textContent = '—';
        statMidLab.textContent = 'Players Joined';
        statMid.textContent = (p.playerCount || 0).toLocaleString();
        statTime.textContent = '—';
        qDisplay.classList.add('hidden');
        lbWrap.classList.add('hidden');
        setBadge('lobby', 'Lobby');
        stopTimer();
        updateButtonState();
      });

      socket.on('state:question', (q) => {
        // Server doesn't separately broadcast lobby→active vs active→closed when only the
        // timer expires — we infer state from whether we're past q.endsAt.
        serverState = (Date.now() < q.endsAt) ? 'active' : 'closed';
        lastQuestion = q;
        lastReveal = null;

        statQ.textContent = `${q.index + 1} / ${q.total}`;
        statMidLab.textContent = 'Answers In';
        statMid.textContent = `${lastAnswerCount.count.toLocaleString()} / ${lastAnswerCount.total.toLocaleString()}`;
        renderQuestion(q, null);
        qDisplay.classList.remove('hidden');
        lbWrap.classList.add('hidden');

        const skewMs = Date.now() - q.serverNow;
        startTimer(q.endsAt + skewMs);

        setBadge(serverState, serverState === 'active' ? 'Live' : 'Time up');
        updateButtonState();
      });

      socket.on('state:answerCount', (a) => {
        lastAnswerCount = { count: a.count || 0, total: a.total || 0 };
        // Only update the visible counter if a question is the current focus.
        if (serverState === 'active' || serverState === 'closed') {
          statMidLab.textContent = 'Answers In';
          statMid.textContent = `${lastAnswerCount.count.toLocaleString()} / ${lastAnswerCount.total.toLocaleString()}`;
        }
        // The server marks the final flush after timer expiry — flip our local view to "closed".
        if (a.final) {
          serverState = 'closed';
          stopTimer();
          statTime.textContent = '0s';
          setBadge('closed', 'Time up');
          updateButtonState();
        }
      });

      socket.on('state:reveal', (r) => {
        serverState = 'revealed';
        lastReveal = r;
        renderQuestion(lastQuestion || { text: r.questionText, options: r.options }, r.correctOption);
        qDisplay.classList.remove('hidden');
        renderLeaderboard(r.leaderboard || []);
        lbWrap.classList.remove('hidden');
        statMidLab.textContent = '% Correct';
        statMid.textContent = (r.pctCorrect || 0) + '%';
        statTime.textContent = '—';
        stopTimer();
        setBadge('revealed', 'Revealed');
        updateButtonState();
      });

      socket.on('state:finished', (f) => {
        serverState = 'finished';
        statQ.textContent = '—';
        statMidLab.textContent = 'Game';
        statMid.textContent = 'Done';
        statTime.textContent = '—';
        qDisplay.classList.add('hidden');
        renderLeaderboard(f.podium || []);
        lbWrap.classList.remove('hidden');
        setBadge('finished', 'Finished');
        updateButtonState();
      });

      socket.on('state:reset', () => {
        // Server is about to follow up with state:meta (new code) and state:lobby;
        // those handlers do the real UI rebuild. We just flash a confirmation toast
        // so the moderator sees something happened, plus belt-and-braces local cleanup.
        lastAnswerCount = { count: 0, total: 0 };
        lastQuestion = null;
        lastReveal = null;
        showToast('Game reset — back to lobby');
      });
    }

    // ===== Rendering =====
    function setBadge(cls, text) {
      stateBadge.className = 'badge ' + cls;
      stateBadge.innerHTML = `<span class="pulse"></span><span>${text}</span>`;
    }

    function renderQuestion(q, correctIndex) {
      qText.textContent = q.text || '';
      qOpts.innerHTML = '';
      const letters = ['A', 'B', 'C', 'D'];
      (q.options || []).forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'opt' + (correctIndex === i ? ' correct' : '');
        div.innerHTML = `<span class="letter">${letters[i]}</span><span>${escapeHtml(opt)}</span>`;
        qOpts.appendChild(div);
      });
    }

    function renderLeaderboard(rows) {
      lbBody.innerHTML = '';
      rows.slice(0, 5).forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML =
          `<span class="pos">${i + 1}</span>` +
          `<span class="email">${escapeHtml(p.email)}</span>` +
          `<span class="pts">${p.score.toLocaleString()}</span>`;
        lbBody.appendChild(row);
      });
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
    }

    // ===== Buttons =====
    btnAdvance.addEventListener('click', () => {
      if (btnAdvance.disabled) return;
      socket.emit('host:advance', {}, (ack) => {
        if (!ack || !ack.ok) console.warn('advance rejected:', ack && ack.error);
      });
    });

    btnReveal.addEventListener('click', () => {
      if (btnReveal.disabled) return;
      // If the question is still active, ask before doing an early reveal — easy to misclick.
      if (serverState === 'active') {
        if (!confirm('Question is still live. Reveal early and cut off remaining answers?')) return;
      }
      socket.emit('host:reveal', {}, (ack) => {
        if (!ack || !ack.ok) console.warn('reveal rejected:', ack && ack.error);
      });
    });

    btnReset.addEventListener('click', () => {
      if (btnReset.disabled) return;
      // Different copy for end-of-game vs mid-game so the moderator gets a
      // clearer mental picture of what "reset" means in each context.
      const msg = (serverState === 'finished')
        ? 'Start a new game?\n\nThis clears all players and scores from the previous round so a fresh game can begin. A new room code will be generated.'
        : 'Reset the game NOW?\n\nThis will clear all players and scores immediately, and rotate the room code. Use this only if the current game is unrecoverable. This cannot be undone.';
      if (!confirm(msg)) return;
      socket.emit('host:reset', {}, (ack) => {
        if (!ack || !ack.ok) console.warn('reset rejected:', ack && ack.error);
      });
    });

    function updateButtonState() {
      const connected = socket && socket.connected;
      // ADVANCE: valid from lobby (start) or revealed (next).
      btnAdvance.disabled = !connected || (serverState !== 'lobby' && serverState !== 'revealed');
      btnAdvance.textContent =
        serverState === 'lobby'    ? 'Start Quiz' :
        serverState === 'revealed' && lastQuestion && lastQuestion.index === lastQuestion.total - 1 ? 'Show Final Results' :
        serverState === 'revealed' ? 'Next Question' :
        serverState === 'finished' ? 'Finished' : 'Advance';

      // REVEAL: valid from active (early) or closed.
      btnReveal.disabled  = !connected || (serverState !== 'active' && serverState !== 'closed');
      btnReveal.textContent = serverState === 'active' ? 'Reveal Early' : 'Reveal';

      // RESET: always usable when connected. Promoted to btn-primary at the end
      // of the game so it becomes the obvious next action; otherwise secondary.
      btnReset.disabled = !connected;
      if (serverState === 'finished') {
        btnReset.className = 'btn btn-primary';
        btnReset.textContent = 'Start New Game';
      } else {
        btnReset.className = 'btn btn-secondary';
        btnReset.textContent = 'Reset';
      }
    }

    // ===== Timer =====
    function startTimer(endsAtLocalMs) {
      stopTimer();
      function tick() {
        const remaining = Math.max(0, endsAtLocalMs - Date.now());
        const sec = Math.ceil(remaining / 1000);
        statTime.textContent = sec + 's';
        if (remaining <= 0) {
          stopTimer();
        }
      }
      tick();
      timerInterval = setInterval(tick, 200);
    }
    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
  </script>
</body>
</html>
