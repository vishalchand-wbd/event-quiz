<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#7b2fff">
  <title>Quiz — Big Screen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #141018;
      --purple: #7b2fff;
      --purple-dark: #4a0fc7;
      --yellow: #ffe600;
      --mint: #4ef2c6;
      --coral: #ff5c7a;
      --paper: #fef7ff;
      --brand: var(--purple);
      --brand-glow: rgba(255, 230, 0, 0.45);
      --bg: #1a0f2e;
      --bg-2: #251838;
      --surface: #fef7ff;
      --line: var(--ink);
      --text: #fef7ff;
      --muted: #c4b8dc;
      --green: #4ef2c6;
      --red: #ff5c7a;
      --gold: #ffe600;
      --gold-warm: #ffb347;
      --shadow: 8px 8px 0 var(--ink);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100vh; overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Fredoka', system-ui, sans-serif;
    }
    body {
      background:
        radial-gradient(ellipse at top left, rgba(255, 230, 0, 0.12), transparent 55%),
        radial-gradient(ellipse at bottom right, rgba(123, 47, 255, 0.2), transparent 50%),
        linear-gradient(165deg, #1a0f2e 0%, #12081f 50%, #0d0618 100%);
    }

    .topbar {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 18px 36px;
      display: flex; align-items: center; gap: 16px;
      z-index: 10;
      background: var(--yellow);
      color: var(--ink);
      border-bottom: 5px solid var(--ink);
      box-shadow: 0 6px 0 rgba(20, 16, 24, 0.35);
    }
    .topbar .logo  { height: 36px; filter: none; opacity: 1; }
    .topbar h1 {
      margin: 0; font-size: 19px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.14em;
    }
    .topbar .meta {
      margin-left: auto;
      font-size: 14px; font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.05em;
      padding: 8px 14px;
      background: var(--paper);
      border: 3px solid var(--ink);
      border-radius: 999px;
      box-shadow: 4px 4px 0 var(--ink);
    }

    .stage {
      position: absolute; inset: 0;
      padding: 100px 60px 60px;
      display: flex; flex-direction: column;
    }

    /* ============== LOBBY ============== */
    .lobby {
      flex: 1;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 60px;
      align-items: center;
    }
    .lobby .left .kicker {
      font-size: 18px; font-weight: 800; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--yellow);
      text-shadow: 3px 3px 0 var(--ink);
    }
    .lobby .left h2 {
      margin: 14px 0 32px;
      font-size: clamp(60px, 8vw, 132px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.03em;
      text-shadow: 6px 6px 0 rgba(255, 230, 0, 0.35);
    }
    .lobby .left .url {
      display: inline-block;
      padding: 18px 28px;
      background: var(--paper);
      border: 5px solid var(--ink);
      border-radius: var(--radius);
      font-family: ui-monospace, monospace;
      font-size: clamp(20px, 1.8vw, 32px);
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.01em;
      box-shadow: var(--shadow);
    }
    .lobby .right {
      display: flex; flex-direction: column; align-items: center; gap: 36px;
    }
    .lobby .qr-wrap {
      width: clamp(220px, 30vw, 380px);
      aspect-ratio: 1 / 1;
      background: #fff;
      border-radius: var(--radius);
      padding: 18px;
      border: 5px solid var(--ink);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow);
    }
    .lobby .qr-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .lobby .qr-wrap #qr-target { width: 100%; height: 100%; }
    .lobby .qr-wrap #qr-target img { width: 100% !important; height: 100% !important; display: block; }
    .lobby .qr-wrap #qr-target canvas { display: none !important; }
    .lobby .qr-wrap .placeholder {
      color: var(--ink); font-size: 14px; text-align: center;
      font-family: ui-monospace, monospace;
      font-weight: 700;
    }
    .lobby .player-counter {
      text-align: center;
    }
    .lobby .player-counter .label {
      font-size: 14px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.12em;
    }
    .lobby .player-counter .num {
      font-size: clamp(72px, 9vw, 144px);
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.04em;
      background: linear-gradient(180deg, #fef7ff 0%, #ffe600 55%, #7b2fff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(4px 4px 0 var(--ink));
    }
    .lobby .left .code-display {
      margin-top: 36px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .lobby .left .code-label {
      font-size: 14px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.12em;
    }
    .lobby .left .code-value {
      font-family: ui-monospace, monospace;
      font-size: clamp(72px, 9vw, 144px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.08em;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(180deg, #fef7ff 0%, #ffe600 50%, #4ef2c6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(5px 5px 0 var(--ink));
    }

    /* ============== PREVIEW ============== */
    .preview {
      flex: 1;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      gap: 36px; padding: 40px;
      text-align: center;
    }
    .preview .preview-label {
      font-size: 17px; font-weight: 800;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--ink);
      background: var(--mint);
      padding: 12px 22px;
      border: 4px solid var(--ink);
      border-radius: 999px;
      box-shadow: var(--shadow);
    }
    .preview .preview-q-text {
      margin: 0;
      font-size: clamp(50px, 7vw, 124px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
      max-width: 1400px;
      text-shadow: 6px 6px 0 rgba(255, 230, 0, 0.35);
    }
    .preview .preview-counter {
      font-size: 15px; font-weight: 800;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink);
      margin-top: 12px;
      font-variant-numeric: tabular-nums;
      padding: 10px 18px;
      background: var(--paper);
      border: 4px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: 6px 6px 0 var(--ink);
    }

    /* ============== QUESTION ============== */
    .question {
      flex: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 32px;
    }
    .question .qmeta {
      display: flex; align-items: center; gap: 24px;
      font-size: 16px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--muted);
    }
    .question .qmeta .dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--yellow);
      border: 3px solid var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      animation: livepulse 1.4s ease-in-out infinite;
    }
    @keyframes livepulse {
      0%, 100% { opacity: 0.5; transform: scale(0.85); }
      50%      { opacity: 1;   transform: scale(1.15); }
    }
    .question h2.q-text {
      margin: 0;
      font-size: clamp(40px, 5.2vw, 96px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
      text-shadow: 5px 5px 0 rgba(123, 47, 255, 0.35);
    }
    .question .opts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .question .opt {
      display: flex; align-items: center; gap: 22px;
      padding: 22px 28px;
      background: var(--surface);
      border: 5px solid var(--ink);
      border-radius: var(--radius);
      font-size: clamp(20px, 2.2vw, 36px);
      font-weight: 800;
      line-height: 1.2;
      color: var(--ink);
      box-shadow: var(--shadow);
    }
    .question .opt:nth-child(4n + 1) { background: var(--yellow); }
    .question .opt:nth-child(4n + 2) { background: var(--mint); }
    .question .opt:nth-child(4n + 3) { background: #e8d4ff; }
    .question .opt:nth-child(4n + 4) { background: #ffb8c6; }
    .question .opt .letter {
      flex: 0 0 56px; height: 56px; border-radius: 50%;
      background: var(--paper);
      color: var(--ink);
      border: 4px solid var(--ink);
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 22px;
      box-shadow: 4px 4px 0 var(--ink);
    }
    .question .footer {
      display: flex; justify-content: space-between; align-items: end;
    }
    .question .answers, .question .timer-block {
      display: flex; flex-direction: column;
    }
    .question .label {
      font-size: 14px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px;
    }
    .question .big-num {
      font-size: clamp(60px, 7vw, 112px);
      font-weight: 900; line-height: 1;
      font-variant-numeric: tabular-nums; letter-spacing: -0.03em;
    }
    .question .big-num .of {
      color: var(--muted);
      font-size: 0.5em;
      font-weight: 700;
    }
    .question .timer-block { text-align: right; }
    .question .timer-num.warn {
      color: var(--coral);
      animation: warnpulse 0.7s ease-in-out infinite;
      text-shadow: 4px 4px 0 var(--ink);
    }
    @keyframes warnpulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

    /* ============== REVEAL ============== */
    .reveal {
      flex: 1;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 48px;
    }
    .reveal .chart-side {
      display: flex; flex-direction: column;
      background: var(--paper);
      color: var(--ink);
      border: 5px solid var(--ink);
      border-radius: var(--radius);
      padding: 28px 32px;
      box-shadow: var(--shadow);
    }
    .reveal .chart-side .q-text {
      margin: 0 0 6px;
      font-size: clamp(20px, 2vw, 30px);
      font-weight: 800;
      line-height: 1.2;
    }
    .reveal .chart-side .pct {
      margin: 8px 0 22px;
      font-size: 18px; font-weight: 800;
      color: var(--purple-dark);
      letter-spacing: 0.02em;
    }
    .reveal .chart-side .pct .big {
      font-size: 44px;
      font-variant-numeric: tabular-nums;
    }
    .reveal .chart-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
    }
    .reveal .leader-side {
      display: flex; flex-direction: column;
      background: rgba(37, 24, 56, 0.92);
      border: 5px solid var(--ink);
      border-radius: var(--radius);
      padding: 28px 32px;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }
    .reveal .leader-side h3 {
      margin: 0 0 18px;
      font-size: 17px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--yellow);
      text-shadow: 2px 2px 0 var(--ink);
    }
    .reveal .leader-row {
      display: flex; align-items: center; gap: 18px;
      padding: 12px 16px;
      border-radius: var(--radius);
      margin-bottom: 8px;
      background: var(--paper);
      border: 4px solid var(--ink);
      box-shadow: 4px 4px 0 rgba(20, 16, 24, 0.55);
    }
    .reveal .leader-row .pos {
      flex: 0 0 44px; height: 44px; border-radius: 50%;
      background: var(--yellow);
      color: var(--ink);
      border: 3px solid var(--ink);
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 18px;
      box-shadow: 3px 3px 0 var(--ink);
    }
    .reveal .leader-row .name {
      flex: 1;
      font-size: clamp(16px, 1.4vw, 22px);
      font-weight: 800;
      color: var(--ink);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      transition: filter 600ms ease-out;
    }
    .reveal .leader-row .pts {
      font-variant-numeric: tabular-nums;
      font-weight: 900;
      font-size: clamp(18px, 1.5vw, 26px);
      color: var(--purple-dark);
    }
    .reveal .leader-row.blurred .name {
      filter: blur(10px);
      user-select: none;
    }
    .reveal .leader-side .empty {
      padding: 24px 16px;
      color: var(--muted); font-style: italic;
      font-size: 16px; text-align: center;
      font-weight: 600;
    }

    /* ============== FINISHED (Stage D — two phases) ==============
       Phase A (default, !podiumRevealed): full top-10 list with top 3 names
       blurred + "Thanks for participating" message.
       Phase B (.revealed): pillars (silver | gold | bronze, gold middle/tallest)
       + ranks 4-10 list + "🏆 Champions" gold-gradient title + confetti rain.
       Both phases occupy the same absolute-positioned area; opacity controls
       which is visible. The .animate class — only applied during the live
       transition — drives the pillar pop and title-pop animations. On
       reconnect with podiumRevealed=true, .revealed is added but .animate is
       NOT (so reconnects don't replay the celebration). */
    .finished {
      flex: 1;
      position: relative;
      width: 100%;
    }
    .finished .phase {
      position: absolute;
      inset: 0;
      display: flex; flex-direction: column; align-items: center;
      transition: opacity 600ms ease-in-out;
    }
    .finished .phase-blurred  { opacity: 1; }
    .finished .phase-revealed { opacity: 0; pointer-events: none; }
    .finished.revealed .phase-blurred  { opacity: 0; pointer-events: none; }
    .finished.revealed .phase-revealed { opacity: 1; pointer-events: auto; }

    /* Golden glow pulse during the live celebration moment */
    .finished .glow-pulse {
      position: absolute; inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center,
        rgba(244, 196, 48, 0.18) 0%,
        rgba(244, 196, 48, 0.06) 30%,
        transparent 60%);
      opacity: 0;
    }
    .finished.animate.revealed .glow-pulse {
      animation: glowPulse 3s ease-out 600ms;
    }
    @keyframes glowPulse {
      0%   { opacity: 0; transform: scale(0.6); }
      40%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.3); }
    }

    /* PHASE A — final standings list */
    .finished .standard-title {
      margin: 0 0 36px;
      font-size: clamp(48px, 6vw, 104px);
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(180deg, #fef7ff 0%, #ffe600 45%, #7b2fff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
      filter: drop-shadow(5px 5px 0 var(--ink));
    }
    .finished .top-10-list {
      width: 100%;
      max-width: 880px;
      margin-bottom: 32px;
    }
    .finished .top-10-list .row {
      display: flex; align-items: center; gap: 18px;
      padding: 14px 24px;
      border-radius: var(--radius);
      margin-bottom: 10px;
      background: var(--paper);
      border: 5px solid var(--ink);
      box-shadow: var(--shadow);
    }
    .finished .top-10-list .row .pos {
      flex: 0 0 60px;
      font-weight: 900; color: var(--ink);
      font-variant-numeric: tabular-nums;
      font-size: clamp(18px, 1.6vw, 26px);
    }
    .finished .top-10-list .row .name {
      flex: 1;
      font-size: clamp(18px, 1.8vw, 28px);
      font-weight: 800;
      color: var(--ink);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      transition: filter 800ms ease-out;
    }
    .finished .top-10-list .row.blurred .name {
      filter: blur(10px);
      user-select: none;
    }
    .finished .top-10-list .row .pts {
      font-variant-numeric: tabular-nums;
      font-weight: 900;
      font-size: clamp(20px, 1.8vw, 30px);
      color: var(--purple-dark);
    }
    .finished .thanks-msg {
      margin-top: 16px;
      font-size: clamp(28px, 3vw, 56px);
      font-weight: 900;
      text-align: center;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, #ffe600 0%, #7b2fff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(4px 4px 0 var(--ink));
    }
    .finished .top-10-list .empty {
      padding: 36px 0;
      color: var(--muted); font-style: italic;
      font-size: clamp(18px, 1.6vw, 24px);
      text-align: center;
    }

    /* PHASE B — celebration */
    .finished .celebration-title {
      margin: 0 0 48px;
      font-size: clamp(54px, 7vw, 130px);
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(180deg, #ffe600 0%, #ff8c00 55%, #ff5c7a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
      filter: drop-shadow(6px 6px 0 var(--ink));
    }
    .finished.animate.revealed .celebration-title {
      animation: titlePop 1200ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes titlePop {
      0%   { transform: scale(0.4); opacity: 0; }
      50%  { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .finished .podium {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 28px;
      align-items: end;
      width: 100%;
      max-width: 1100px;
      margin-bottom: 48px;
    }
    .finished .pillar {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      padding: 32px 22px;
      background: var(--paper);
      color: var(--ink);
      border: 5px solid var(--ink);
      border-radius: var(--radius) var(--radius) 0 0;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .finished .pillar .medal {
      font-size: clamp(48px, 5vw, 72px); line-height: 1; margin-bottom: 6px;
    }
    .finished .pillar .name {
      font-size: clamp(20px, 1.8vw, 30px);
      font-weight: 800;
      max-width: 100%;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .finished .pillar .score {
      font-size: clamp(32px, 3.2vw, 56px);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: var(--purple-dark);
    }
    .finished .pillar.gold {
      padding-bottom: 72px;
      border-color: var(--gold);
      background: linear-gradient(180deg, #fff9e0 0%, #ffe600 100%);
      box-shadow: 10px 10px 0 var(--ink);
    }
    .finished .pillar.silver {
      padding-bottom: 44px;
      border-color: var(--ink);
      background: linear-gradient(180deg, #f5f5f5 0%, #c8c8d4 100%);
    }
    .finished .pillar.bronze {
      padding-bottom: 28px;
      border-color: var(--ink);
      background: linear-gradient(180deg, #ffd9b8 0%, #cd7f32 100%);
    }
    .finished.animate.revealed .pillar {
      animation: pillarPop 700ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .finished.animate.revealed .pillar.silver { animation-delay: 600ms; }
    .finished.animate.revealed .pillar.bronze { animation-delay: 900ms; }
    .finished.animate.revealed .pillar.gold   { animation-delay: 1200ms; }
    @keyframes pillarPop {
      0%   { opacity: 0; transform: scale(0.4) translateY(60px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .finished .also-rans {
      width: 100%; max-width: 720px;
    }
    .finished .also-rans .row {
      display: flex; align-items: center; gap: 18px;
      padding: 12px 18px;
      border-bottom: 4px solid var(--ink);
      font-size: clamp(16px, 1.4vw, 22px);
      font-weight: 700;
      color: var(--paper);
    }
    .finished .also-rans .row .pos {
      flex: 0 0 44px;
      font-weight: 800; color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .finished .also-rans .row .name { flex: 1; font-weight: 700;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .finished .also-rans .row .pts {
      font-variant-numeric: tabular-nums; font-weight: 900; color: var(--yellow);
    }

    /* Confetti — hand-rolled to avoid an extra CDN dependency the night
       before the live event. Emoji spans are absolutely positioned, drift
       down with rotation, and fade out. JS spawns ~60 pieces with random
       delays, x positions, durations, and font sizes for organic feel. */
    .confetti-container {
      position: absolute; inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 50;
    }
    .confetti-piece {
      position: absolute;
      top: -60px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="topbar">
    <img src="/logo.png" alt="" class="logo" onerror="this.style.display='none'">
    <h1>Live Quiz</h1>
    <div class="meta" id="topmeta"></div>
  </div>

  <!-- ============== LOBBY ============== -->
  <div class="stage" id="stage-lobby">
    <div class="lobby">
      <div class="left">
        <div class="kicker">Scan or use the code</div>
        <h2>Join the<br>Quiz</h2>
        <div class="url" id="join-url">https://quizs.live/play</div>
        <div class="code-display">
          <div class="code-label">Room code</div>
          <div class="code-value" id="room-code">----</div>
        </div>
      </div>
      <div class="right">
        <div class="qr-wrap">
          <div id="qr-target"></div>
        </div>
        <div class="player-counter">
          <div class="label">Players Joined</div>
          <div class="num" id="lobby-count">0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============== PREVIEW ============== -->
  <div class="stage hidden" id="stage-preview">
    <div class="preview">
      <div class="preview-label">Get ready</div>
      <h2 class="preview-q-text" id="p-q-text">…</h2>
      <div class="preview-counter" id="p-q-counter">Question 1 of 10</div>
    </div>
  </div>

  <!-- ============== QUESTION ============== -->
  <div class="stage hidden" id="stage-question">
    <div class="question">
      <div class="qmeta">
        <span class="dot"></span>
        <span id="q-counter">Question 1 of 10</span>
      </div>
      <h2 class="q-text" id="q-text">…</h2>
      <div class="opts" id="q-opts"></div>
      <div class="footer">
        <div class="answers">
          <div class="label">Answers in</div>
          <div class="big-num"><span id="ans-count">0</span><span class="of"> / <span id="ans-total">0</span></span></div>
        </div>
        <div class="timer-block">
          <div class="label">Time left</div>
          <div class="big-num"><span class="timer-num" id="q-timer">--</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============== REVEAL ============== -->
  <div class="stage hidden" id="stage-reveal">
    <div class="reveal">
      <div class="chart-side">
        <h3 class="q-text" id="r-q-text">…</h3>
        <div class="pct"><span class="big" id="r-pct">0</span>% answered correctly</div>
        <div class="chart-wrap">
          <canvas id="reveal-chart"></canvas>
        </div>
      </div>
      <div class="leader-side">
        <h3>Top 10 — Live</h3>
        <div id="leader-rows"></div>
      </div>
    </div>
  </div>

  <!-- ============== FINISHED (Stage D) ============== -->
  <div class="stage hidden" id="stage-finished">
    <div class="finished" id="finished-container">
      <div class="phase phase-blurred">
        <h2 class="standard-title">Final Standings</h2>
        <div class="top-10-list" id="finished-list"></div>
        <div class="thanks-msg">Thanks for participating! 🎉</div>
      </div>
      <div class="phase phase-revealed">
        <h2 class="celebration-title">🏆 Champions</h2>
        <div class="podium" id="finished-podium"></div>
        <div class="also-rans" id="finished-also-rans"></div>
      </div>
      <div class="glow-pulse"></div>
      <div class="confetti-container" id="confetti"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    'use strict';

    const stages = {
      lobby:    document.getElementById('stage-lobby'),
      preview:  document.getElementById('stage-preview'),
      question: document.getElementById('stage-question'),
      reveal:   document.getElementById('stage-reveal'),
      finished: document.getElementById('stage-finished'),
    };
    function showStage(name) {
      Object.entries(stages).forEach(([k, el]) => el.classList.toggle('hidden', k !== name));
    }

    function displayName(p) {
      if (!p) return '—';
      const first = (p.firstName || '').trim();
      const last  = (p.lastName  || '').trim();
      const full = (first + ' ' + last).trim();
      return full || '—';
    }

    const playUrl = `${location.origin}/play`;
    document.getElementById('join-url').textContent = playUrl;

    const roomCodeEl = document.getElementById('room-code');
    let qrCodeRendered = false;

    function renderQRCode(targetUrl) {
      const target = document.getElementById('qr-target');
      target.innerHTML = '';
      if (window.QRCode) {
        new QRCode(target, {
          text: targetUrl,
          width: 480,
          height: 480,
          colorDark:  '#000000',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M,
        });
        qrCodeRendered = true;
      } else if (!qrCodeRendered) {
        const wrap = document.querySelector('.qr-wrap');
        wrap.innerHTML = `<div class="placeholder">QR unavailable. Visit:<br><br><strong>${targetUrl}</strong></div>`;
      }
    }

    renderQRCode(playUrl);

    const ansCountEl = document.getElementById('ans-count');
    const ansTotalEl = document.getElementById('ans-total');
    let displayedCount = 0;
    let targetCount    = 0;
    function tweenAnswerCount() {
      if (displayedCount === targetCount) return;
      const next = displayedCount + (targetCount - displayedCount) * 0.3;
      displayedCount = Math.abs(next - targetCount) < 0.5 ? targetCount : next;
      ansCountEl.textContent = Math.round(displayedCount).toLocaleString();
    }
    setInterval(tweenAnswerCount, 33);

    let revealChart = null;
    function destroyRevealChart() {
      if (revealChart) {
        revealChart.destroy();
        revealChart = null;
      }
    }

    const finishedContainer = document.getElementById('finished-container');
    const finishedList      = document.getElementById('finished-list');
    const finishedPodium    = document.getElementById('finished-podium');
    const finishedAlsoRans  = document.getElementById('finished-also-rans');
    const confettiContainer = document.getElementById('confetti');
    let confettiCleanupTimer = null;

    const socket = io({ transports: ['websocket'], auth: { role: 'board' } });

    socket.on('state:meta', (m) => {
      if (!m || !m.code) return;
      roomCodeEl.textContent = m.code;
      renderQRCode(`${playUrl}?code=${m.code}`);
    });

    socket.on('state:lobby', (p) => {
      stopTimer();
      destroyRevealChart();
      clearConfetti();
      finishedContainer.classList.remove('revealed', 'animate');
      document.getElementById('lobby-count').textContent = (p.playerCount || 0).toLocaleString();
      document.getElementById('topmeta').textContent = '';
      showStage('lobby');
    });

    socket.on('state:question_preview', (q) => {
      stopTimer();
      destroyRevealChart();
      clearConfetti();
      finishedContainer.classList.remove('revealed', 'animate');
      displayedCount = 0;
      targetCount = 0;
      ansCountEl.textContent = '0';
      ansTotalEl.textContent = '0';

      document.getElementById('p-q-text').textContent = q.text || '…';
      const num = (q.index || 0) + 1;
      const total = q.total || 0;
      document.getElementById('p-q-counter').textContent =
        total ? `Question ${num} of ${total}` : `Question ${num}`;
      document.getElementById('topmeta').textContent =
        total ? `${num} / ${total}` : `${num}`;
      showStage('preview');
    });

    socket.on('state:question', (q) => {
      destroyRevealChart();
      clearConfetti();
      finishedContainer.classList.remove('revealed', 'animate');
      document.getElementById('q-counter').textContent = `Question ${q.index + 1} of ${q.total}`;
      document.getElementById('q-text').textContent = q.text;
      const optsEl = document.getElementById('q-opts');
      optsEl.innerHTML = '';
      const letters = ['A', 'B', 'C', 'D'];
      q.options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'opt';
        div.innerHTML = `<span class="letter">${letters[i]}</span><span>${escapeHtml(opt)}</span>`;
        optsEl.appendChild(div);
      });

      displayedCount = 0;
      targetCount = 0;
      ansCountEl.textContent = '0';

      const skewMs = Date.now() - q.serverNow;
      startTimer(q.endsAt + skewMs);

      document.getElementById('topmeta').textContent = `${q.index + 1} / ${q.total}`;
      showStage('question');
    });

    socket.on('state:answerCount', (a) => {
      targetCount = a.count || 0;
      ansTotalEl.textContent = (a.total || 0).toLocaleString();
    });

    socket.on('state:reveal', (r) => {
      stopTimer();
      document.getElementById('r-q-text').textContent = r.questionText || '';
      document.getElementById('r-pct').textContent = (r.pctCorrect || 0);

      const styles = getComputedStyle(document.documentElement);
      const greenColor = styles.getPropertyValue('--green').trim() || '#22C58A';
      const redColor   = styles.getPropertyValue('--red').trim()   || '#E5484D';
      const inkColor   = styles.getPropertyValue('--ink').trim()   || '#141018';
      const mutedInk   = styles.getPropertyValue('--purple-dark').trim() || '#4a0fc7';
      const letters = ['A', 'B', 'C', 'D'];
      const labels = letters.map((L, i) => `${L}. ${(r.options && r.options[i]) || ''}`);
      const colors = labels.map((_, i) => i === r.correctOption ? greenColor : redColor);

      destroyRevealChart();
      const ctx = document.getElementById('reveal-chart').getContext('2d');
      revealChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: r.distribution || [0,0,0,0],
            backgroundColor: colors,
            borderRadius: 12,
            borderSkipped: false,
            borderColor: inkColor,
            borderWidth: 3,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 700, easing: 'easeOutCubic' },
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          scales: {
            x: {
              ticks: {
                color: inkColor,
                font: { family: 'Fredoka', weight: '700', size: 18 },
              },
              grid: { display: false },
            },
            y: {
              beginAtZero: true,
              ticks: {
                color: mutedInk,
                font: { family: 'Fredoka', weight: '600', size: 14 },
                precision: 0,
              },
              grid: { color: 'rgba(20, 16, 24, 0.12)' },
            },
          },
        },
      });

      const lb = r.leaderboard || [];
      const lbEl = document.getElementById('leader-rows');
      lbEl.innerHTML = '';
      const list = lb.slice(0, 10);
      if (list.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'No players yet.';
        lbEl.appendChild(empty);
      } else {
        list.forEach((p, i) => {
          const row = document.createElement('div');
          row.className = 'leader-row' + (i < 3 ? ' blurred' : '');
          row.innerHTML =
            `<span class="pos">${i + 1}</span>` +
            `<span class="name">${escapeHtml(displayName(p))}</span>` +
            `<span class="pts">${(p.score || 0).toLocaleString()}</span>`;
          lbEl.appendChild(row);
        });
      }

      showStage('reveal');
    });

    // Stage D: state:finished now carries top10 + podiumRevealed flag.
    // Render BOTH phases (one with blurred names, one with pillars), then
    // toggle .revealed based on the flag. .animate is NOT applied here —
    // initial render always snaps to current phase without animation.
    socket.on('state:finished', (f) => {
      stopTimer();
      destroyRevealChart();

      const top10 = (f && f.top10) ? f.top10.slice(0, 10) : [];
      renderTop10List(top10);
      renderPodiumPhase(top10);

      const isRevealed = !!(f && f.podiumRevealed);
      finishedContainer.classList.toggle('revealed', isRevealed);
      finishedContainer.classList.remove('animate');
      // No confetti on initial render of revealed-state (reconnect case).
      // Confetti only fires from state:podiumRevealed (live transition).
      clearConfetti();

      document.getElementById('topmeta').textContent = 'Final';
      showStage('finished');
    });

    // Stage D: live transition trigger. Add .revealed AND .animate to drive
    // the title pop, pillar pop sequence, and golden glow pulse. Also fire
    // the confetti rain. .animate auto-removes after the animations complete
    // so subsequent CSS state changes don't re-trigger them.
    socket.on('state:podiumRevealed', () => {
      // If already revealed (e.g. host double-clicked), don't re-animate.
      if (finishedContainer.classList.contains('revealed')) return;

      finishedContainer.classList.add('revealed', 'animate');
      launchConfetti();

      // Remove .animate after the longest animation completes (gold pillar
      // pop ends at 1900ms, glow pulse at 3600ms). Pad to 4000ms for safety.
      setTimeout(() => {
        finishedContainer.classList.remove('animate');
      }, 4000);
    });

    socket.on('state:reset', () => {
      stopTimer();
      destroyRevealChart();
      clearConfetti();
      finishedContainer.classList.remove('revealed', 'animate');
      displayedCount = 0;
      targetCount = 0;
      ansCountEl.textContent = '0';
      ansTotalEl.textContent = '0';
    });

    function renderTop10List(top10) {
      finishedList.innerHTML = '';
      if (top10.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'No players to show.';
        finishedList.appendChild(empty);
        return;
      }
      top10.forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'row' + (i < 3 ? ' blurred' : '');
        row.innerHTML =
          `<span class="pos">#${i + 1}</span>` +
          `<span class="name">${escapeHtml(displayName(p))}</span>` +
          `<span class="pts">${(p.score || 0).toLocaleString()}</span>`;
        finishedList.appendChild(row);
      });
    }

    function renderPodiumPhase(top10) {
      finishedPodium.innerHTML = '';
      finishedAlsoRans.innerHTML = '';

      if (top10.length === 0) {
        // No players — phase B will be empty when revealed. (Phase A's empty
        // state already covers the "no players" case.) Leaving the podium
        // and also-rans containers blank is fine.
        return;
      }

      const top3 = top10.slice(0, 3);
      const medals = ['🥇', '🥈', '🥉'];
      const classes = ['gold', 'silver', 'bronze'];
      // Visual layout: silver | gold | bronze (gold center, tallest).
      const visualOrder = [1, 0, 2];
      visualOrder.forEach((rank) => {
        const p = top3[rank];
        if (!p) return;
        const div = document.createElement('div');
        div.className = `pillar ${classes[rank]}`;
        div.innerHTML =
          `<div class="medal">${medals[rank]}</div>` +
          `<div class="name">${escapeHtml(displayName(p))}</div>` +
          `<div class="score">${(p.score || 0).toLocaleString()}</div>`;
        finishedPodium.appendChild(div);
      });

      top10.slice(3, 10).forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML =
          `<span class="pos">#${i + 4}</span>` +
          `<span class="name">${escapeHtml(displayName(p))}</span>` +
          `<span class="pts">${(p.score || 0).toLocaleString()}</span>`;
        finishedAlsoRans.appendChild(row);
      });
    }

    function launchConfetti() {
      clearConfetti();
      const emojis = ['🎉', '🎊', '✨', '⭐', '💫'];
      const fragment = document.createDocumentFragment();
      for (let i = 0; i < 60; i++) {
        const span = document.createElement('span');
        span.className = 'confetti-piece';
        span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        span.style.left = Math.random() * 100 + 'vw';
        span.style.fontSize = (24 + Math.random() * 20) + 'px';
        span.style.animationDelay = (Math.random() * 1.2) + 's';
        span.style.animationDuration = (3 + Math.random() * 3) + 's';
        fragment.appendChild(span);
      }
      confettiContainer.appendChild(fragment);
      // Auto-cleanup after the longest possible piece finishes (1.2s delay
      // + 6s duration = 7.2s max). Pad to 8000ms.
      if (confettiCleanupTimer) clearTimeout(confettiCleanupTimer);
      confettiCleanupTimer = setTimeout(clearConfetti, 8000);
    }

    function clearConfetti() {
      if (confettiCleanupTimer) {
        clearTimeout(confettiCleanupTimer);
        confettiCleanupTimer = null;
      }
      confettiContainer.innerHTML = '';
    }

    let timerInterval = null;
    function startTimer(endsAtLocalMs) {
      stopTimer();
      const el = document.getElementById('q-timer');
      function tick() {
        const remaining = Math.max(0, endsAtLocalMs - Date.now());
        const sec = Math.ceil(remaining / 1000);
        el.textContent = sec;
        el.classList.toggle('warn', sec <= 5);
        if (remaining <= 0) stopTimer();
      }
      tick();
      timerInterval = setInterval(tick, 200);
    }
    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
  </script>
</body>
</html>
