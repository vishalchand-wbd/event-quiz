name: Deploy to VM
# Push to main = auto-deploy production.
# Push to redesign does NOT auto-deploy — use workflow_dispatch to test redesign
# on the VM only when you mean to. Keeps work-in-progress out of the live demo.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        # Empty default + required:false means: if you don't pass -f ref=...,
        # the checkout falls through to github.ref (which respects --ref).
        # Previously default was 'main', which caused workflow_dispatch to
        # silently deploy main even when --ref polish was given. Don't undo.
        description: 'Branch or tag to deploy (leave empty to use --ref / pushed branch)'
        required: false
        default: ''

# Don't let two deploys race each other if you push twice in quick succession.
# Queue them; let each finish.
concurrency:
  group: deploy-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # For workflow_dispatch with -f ref=..., deploy whatever was passed.
          # For workflow_dispatch without -f ref=..., fall through to github.ref
          # (which is set by --ref polish or similar).
          # For push, deploy the pushed ref (main).
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax-check server.js
        run: node --check server.js

      - name: Install SSH key
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Trust the VM's SSH host key on first contact (TOFU).
          # The VM IP is stable; acceptable for our threat model.
          ssh-keyscan -H quizs.live >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Rsync project files to VM staging directory
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.npm/' \
            --exclude='*.bak' \
            --exclude='*.bak.*' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            ./ \
            azureuser@quizs.live:/home/azureuser/quiz-deploy/

      - name: Apply staging to /opt/quiz and restart service
        # The --exclude=node_modules is CRITICAL: without it, --delete would
        # remove /opt/quiz/node_modules (since staging never has node_modules,
        # only source files). The deps directory is managed separately by
        # install.sh's npm install at provisioning time, not by this deploy.
        # If package.json changes you need to SSH to the VM and run
        # `cd /opt/quiz && sudo npm install --omit=dev` manually for now.
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
              azureuser@quizs.live <<'REMOTE'
          set -e
          sudo /usr/bin/rsync -av --delete --exclude=node_modules /home/azureuser/quiz-deploy/ /opt/quiz/
          sudo /usr/bin/chown -R quiz:quiz /opt/quiz
          sudo /usr/bin/systemctl restart quiz.service
          sleep 3
          sudo /usr/bin/systemctl is-active quiz.service
          REMOTE

      - name: Verify health endpoint
        run: |
          # Give the service a moment to bind the port after restart
          sleep 2
          curl -fsS https://quizs.live/health
          echo